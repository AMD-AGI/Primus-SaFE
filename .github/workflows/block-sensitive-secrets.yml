# Rejects changes that add common secret / token / credential substrings in changed file contents.
# Tune PATTERNS if a rule is too strict for your repo (e.g. fixtures).
name: Block Sensitive Secrets

# PR updates fire pull_request; the same push also fires push — duplicate runs.
# Scan PRs on all branches; scan direct pushes only on protected/default branches.
on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: block-sensitive-secrets-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  block-sensitive-secrets-scan:
    name: Block Sensitive Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (push — compare with previous commit)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout (PR — HEAD, not merge commit, so we scan contributor branch)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch base commit (PR from fork may miss base SHA)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -e
          B="${{ github.event.pull_request.base.sha }}"
          if ! git rev-parse -q --verify "$B" >/dev/null; then
            echo "Fetching base $B from ${{ github.event.pull_request.base.repo.full_name }}"
            git fetch --no-tags --depth=1 \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.event.pull_request.base.repo.full_name }}.git" \
              "$B"
          fi
          if ! git rev-parse -q --verify "$B" >/dev/null; then
            echo '::error::Base commit is not in local clone. Cannot run scan.'
            exit 1
          fi

      - name: Reject if sensitive patterns appear in changed files
        shell: bash
        run: |
          set -euo pipefail
          # File-level whitelist for all rules.
          # Skip markdown docs and test fixtures.
          is_whitelisted_file() {
            local path="$1"
            [[ "$path" == *.md ]] && return 0
            [[ "$path" == */testdata/* ]] && return 0
            [[ "$path" == testdata/* ]] && return 0
            [[ "$path" == SaFE/bootstrap/* ]] && return 0
            return 1
          }

          PATTERNS=(
            # Hugging Face token
            'hf_[A-Za-z0-9]{10,}'

            # OpenAI/API-style key (length >= 5)
            'sk-[a-zA-Z0-9\-]{5,}'
            'ak-[a-zA-Z0-9\-]{5,}'

            # AWS access key id (long-term / temporary)
            'AKIA[0-9A-Z]{16}'
            'ASIA[0-9A-Z]{16}'

            # GitHub personal / app / fine-grained tokens
            'ghp_[0-9a-zA-Z]{36,}'
            'gho_[0-9a-zA-Z]{36,}'
            'ghs_[0-9a-zA-Z]{36,}'
            'ghu_[0-9a-zA-Z]{36,}'
            'github_pat_[0-9a-zA-Z_]{20,}'

            # PEM private key header
            '-----BEGIN[[:space:]]+(EC|OPENSSH|RSA|DSA|PGP[[:space:]]+)?PRIVATE[[:space:]]+KEY-----'

            # Generic API key assignments (value length >= 5)
            '[Aa]pi_?[Kk]ey[[:space:]]*[:=][[:space:]]*[^"'\''#[:space:]]{5,}'
            'API[_-]?[Kk]EY[[:space:]]*[:=][[:space:]]*[^"'\''#[:space:]]{5,}'
            '[Xx]-[Aa]pi-[Kk]ey[[:space:]]*:[[:space:]]*[^#[:space:]]{5,}'

            # Generic password assignments (value length >= 5)
            '[Pp]assword=([^"'\''#]){5,}'
            '[Pp]assword[[:space:]]*[:=][[:space:]]*[^"'\''#[:space:]]{5,}([[:space:]]|#|$)'

            # AWS secret access key assignment
            '[Aa]WS[_-]?[Ss]ECRET[_-]?[Aa]CCESS[_-]?[Kk]EY[[:space:]]*[:=][[:space:]]*[^"'\''#[:space:]]{30,}'
          )

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            _BASE="${{ github.event.pull_request.base.sha }}"
            _HEAD="${{ github.event.pull_request.head.sha }}"
            mapfile -t FILES < <(git diff --name-only "${_BASE}" "${_HEAD}" || true)
            TARGET_SHA="${_HEAD}"
          else
            _BEFORE="${{ github.event.before }}"
            _AFTER="${{ github.event.after }}"
            if [[ -z "$_BEFORE" || "$_BEFORE" == 0000000000000000000000000000000000000000 ]]; then
              mapfile -t FILES < <(git show --name-only --pretty=format: "${_AFTER}" | tail -n +1 || true)
            else
              mapfile -t FILES < <(git diff --name-only "${_BEFORE}" "${_AFTER}" || true)
            fi
            TARGET_SHA="${_AFTER}"
          fi

          FAILED=0
          for f in "${FILES[@]}"; do
            [[ -n "$f" ]] || continue
            if is_whitelisted_file "$f"; then
              continue
            fi
            if ! CONTENT=$(git show "${TARGET_SHA}:$f" 2>/dev/null); then
              continue
            fi
            for p in "${PATTERNS[@]}"; do
              if echo "$CONTENT" | grep -E -a -q "$p"; then
                echo "::error::Disallowed secret-like pattern matched in: $f (pattern: $p)"
                FAILED=1
              fi
            done
          done
          if [[ "$FAILED" -ne 0 ]]; then
            echo "Remove or rotate secret-like tokens, then try again."
            exit 1
          fi
          echo "No sensitive token patterns matched."
