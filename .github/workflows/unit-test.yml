name: Unit Tests

on:
  push:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Align with SaFE/go.work and module go.mod (go 1.25.5).
env:
  GO_VERSION: '1.25.5'

jobs:
  test-safe:
    name: Test SaFE Modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - a2a-gateway
          - apiserver
          - common
          - job-manager
          - node-agent
          - resource-manager
          - utils
          - tools/email-relay-service
          - webhooks
        race:
          - true
        exclude:
          # node-agent, job-manager and resource-manager run without the race
          # detector:
          # - node-agent: depends on cgo/btrfs bindings
          # - job-manager / resource-manager: use gomonkey, which is incompatible
          #   with -race (function patching trips the race detector / checkptr)
          - module: node-agent
            race: true
          - module: job-manager
            race: true
          - module: resource-manager
            race: true
        include:
          - module: node-agent
            race: false
          - module: job-manager
            race: false
          - module: resource-manager
            race: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            SaFE/${{ matrix.module }}/go.sum

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y btrfs-progs libbtrfs-dev

      - name: Run Tests with Coverage
        working-directory: SaFE/${{ matrix.module }}
        id: test
        continue-on-error: true
        run: |
          echo "🧪 Testing ${{ matrix.module }}..."
          # job-manager and resource-manager use gomonkey for function patching,
          # which requires inlining to be disabled (-gcflags=all=-l) so the patch
          # targets exist.
          GCFLAGS=""
          if [ "${{ matrix.module }}" = "job-manager" ] || [ "${{ matrix.module }}" = "resource-manager" ]; then
            GCFLAGS="-gcflags=all=-l"
          fi
          if [ "${{ matrix.race }}" = "false" ]; then
            go test -v ${GCFLAGS} -coverprofile=coverage.out ./... 2>&1 | tee test-output.log
          else
            go test -v -race ${GCFLAGS} -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee test-output.log
          fi
          TEST_RC=${PIPESTATUS[0]}

          # Exclude generated / mock database packages from coverage statistics
          # (gorm-gen DAL/models and gomock mocks are generated code, not unit
          # tested). Only affects the common module; other modules keep all lines.
          if [ -f coverage.out ]; then
            grep -vE '/pkg/database/(client/(mock|dal|model)|gen)/' coverage.out > coverage.filtered || true
            mv coverage.filtered coverage.out
          fi
          exit ${TEST_RC}

      - name: Extract Failed Tests
        working-directory: SaFE/${{ matrix.module }}
        if: always()
        run: |
          MODULE_NAME=$(echo "${{ matrix.module }}" | tr '/' '-')
          echo "MODULE_NAME=${MODULE_NAME}" >> $GITHUB_ENV
          
          # Extract failed tests
          if [ -f test-output.log ]; then
            echo "# Failed Tests for SaFE/${{ matrix.module }}" > failed-tests.md
            echo "" >> failed-tests.md
            
            # Check if there are failed tests
            if grep -E "^--- FAIL:" test-output.log > /dev/null 2>&1; then
              echo "## ❌ Failed Tests" >> failed-tests.md
              echo '```' >> failed-tests.md
              grep -E "^--- FAIL:" test-output.log >> failed-tests.md || true
              echo '```' >> failed-tests.md
              echo "" >> failed-tests.md
              echo "## Failure Details" >> failed-tests.md
              echo '```' >> failed-tests.md
              # Extract failed test details
              awk '/^=== RUN/{test=$0} /^--- FAIL:/{print test; print; getline; while(/^[[:space:]]/ || /^[[:space:]]*Error/){print; getline}}' test-output.log >> failed-tests.md || true
              echo '```' >> failed-tests.md
            else
              echo "✅ All tests passed!" >> failed-tests.md
            fi
          else
            echo "⚠️ No test output file found" > failed-tests.md
          fi

      - name: Check Test Result
        if: steps.test.outcome == 'failure'
        run: exit 1

      - name: Generate Coverage Report
        working-directory: SaFE/${{ matrix.module }}
        if: always()
        run: |
          if [ -f coverage.out ]; then
            echo "📊 Coverage Report for ${{ matrix.module }}:"
            go tool cover -func=coverage.out | tail -n 1
            COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
            echo "Total Coverage: $COVERAGE"
            echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          else
            echo "⚠️  No coverage file generated for ${{ matrix.module }}"
            echo "COVERAGE=0%" >> $GITHUB_ENV
          fi

          # Set artifact name without slashes
          MODULE_NAME=$(echo "${{ matrix.module }}" | tr '/' '-')
          echo "ARTIFACT_NAME=coverage-safe-${MODULE_NAME}" >> $GITHUB_ENV

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: SaFE/${{ matrix.module }}/coverage.out
          retention-days: 30

      - name: Upload Failed Tests Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failed-tests-safe-${{ env.MODULE_NAME }}
          path: SaFE/${{ matrix.module }}/failed-tests.md
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./SaFE/${{ matrix.module }}/coverage.out
          flags: safe-${{ matrix.module }}
          name: safe-${{ matrix.module }}
          fail_ci_if_error: false

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-safe]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports

      - name: Download All Failed Tests Reports
        uses: actions/download-artifact@v4
        with:
          pattern: failed-tests-*
          path: failed-tests-reports

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate Combined Coverage Summary
        run: |
          echo "# 📊 Unit Test Coverage Summary" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "## SaFE Modules" >> coverage-summary.md
          echo "" >> coverage-summary.md
          echo "| Module | Coverage |" >> coverage-summary.md
          echo "|--------|----------|" >> coverage-summary.md
          
          for dir in coverage-reports/coverage-safe-*/; do
            if [ -d "$dir" ]; then
              module=$(basename "$dir" | sed 's/coverage-safe-//')
              if [ -f "$dir/coverage.out" ]; then
                coverage=$(go tool cover -func="$dir/coverage.out" 2>/dev/null | grep total | awk '{print $3}' || echo "N/A")
                echo "| $module | $coverage |" >> coverage-summary.md
              else
                echo "| $module | No tests |" >> coverage-summary.md
              fi
            fi
          done

          # Whole-repository aggregate: sum covered/total statements across every
          # module's coverage.out (mode line skipped). Profiles differ in mode
          # (set vs atomic) but statement counts are comparable.
          OVERALL=$(awk '
            /^mode:/ { next }
            { n=$(NF-1); c=$NF; total+=n; if (c+0>0) covered+=n }
            END { if (total>0) printf "%.1f%%", covered*100.0/total; else printf "N/A" }
          ' coverage-reports/coverage-safe-*/coverage.out 2>/dev/null || echo "N/A")

          echo "" >> coverage-summary.md
          echo "**Overall (all SaFE modules combined): ${OVERALL}**" >> coverage-summary.md

          # Per-package (directory) breakdown for each module.
          echo "" >> coverage-summary.md
          echo "## Per-package coverage" >> coverage-summary.md
          for dir in coverage-reports/coverage-safe-*/; do
            [ -d "$dir" ] || continue
            module=$(basename "$dir" | sed 's/coverage-safe-//')
            [ -f "$dir/coverage.out" ] || continue
            echo "" >> coverage-summary.md
            echo "<details><summary>${module}</summary>" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "| Package | Coverage |" >> coverage-summary.md
            echo "|---------|----------|" >> coverage-summary.md
            awk '
              /^mode:/ { next }
              {
                p=index($1, ":"); file=substr($1, 1, p-1);
                pos=0; for (i=length(file); i>0; i--) { if (substr(file,i,1)=="/") { pos=i; break } }
                d=substr(file, 1, pos-1);
                n=$(NF-1); c=$NF; tot[d]+=n; if (c+0>0) cov[d]+=n;
              }
              END { for (d in tot) printf "%s %.1f%%\n", d, cov[d]*100.0/tot[d] }
            ' "$dir/coverage.out" \
              | sed "s#github.com/AMD-AIG-AIMA/SAFE/##" \
              | sort \
              | while read -r pkg pct; do echo "| \`$pkg\` | $pct |" >> coverage-summary.md; done
            echo "" >> coverage-summary.md
            echo "</details>" >> coverage-summary.md
          done

          echo "" >> coverage-summary.md
          echo "---" >> coverage-summary.md
          echo "*Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> coverage-summary.md
          
          cat coverage-summary.md

      - name: Generate Failed Tests Summary
        if: always()
        run: |
          echo ""
          echo "=============================================="
          echo "📋 FAILED TESTS SUMMARY"
          echo "=============================================="
          echo ""
          
          # Create failed tests summary file
          echo "# ❌ Failed Tests Summary" > failed-tests-summary.md
          echo "" >> failed-tests-summary.md
          echo "*Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> failed-tests-summary.md
          echo "" >> failed-tests-summary.md
          
          HAS_FAILURES=false
          
          # Process failed tests for SaFE modules
          echo "## SaFE Modules" >> failed-tests-summary.md
          echo "" >> failed-tests-summary.md
          
          for dir in failed-tests-reports/failed-tests-safe-*/; do
            if [ -d "$dir" ]; then
              module=$(basename "$dir" | sed 's/failed-tests-safe-//')
              if [ -f "$dir/failed-tests.md" ]; then
                if grep -q "❌ Failed Tests" "$dir/failed-tests.md"; then
                  HAS_FAILURES=true
                  echo "### ❌ SaFE/$module" >> failed-tests-summary.md
                  echo "" >> failed-tests-summary.md
                  # Extract failed test content (skip header lines)
                  tail -n +3 "$dir/failed-tests.md" >> failed-tests-summary.md
                  echo "" >> failed-tests-summary.md
                  
                  # Output to console
                  echo "❌ SaFE/$module:"
                  grep -E "^--- FAIL:" "$dir/failed-tests.md" 2>/dev/null || true
                  echo ""
                else
                  echo "### ✅ SaFE/$module - All tests passed" >> failed-tests-summary.md
                  echo "" >> failed-tests-summary.md
                fi
              fi
            fi
          done
          
          echo "=============================================="
          if [ "$HAS_FAILURES" = "true" ]; then
            echo "⚠️  Some tests failed! Check the details above."
          else
            echo "✅ All tests passed across all modules!"
          fi
          echo "=============================================="
          
          cat failed-tests-summary.md

      - name: Upload Failed Tests Summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failed-tests-summary
          path: failed-tests-summary.md
          retention-days: 90

      - name: Upload Coverage Summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.md
          retention-days: 90

      - name: Write Job Summary
        if: always()
        run: |
          # Write combined summary to GitHub Job Summary for direct viewing in Actions page
          echo "# 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ==================== Coverage Table ====================
          echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # SaFE modules coverage table
          echo "### SaFE Modules" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          
          for dir in coverage-reports/coverage-safe-*/; do
            if [ -d "$dir" ]; then
              module=$(basename "$dir" | sed 's/coverage-safe-//')
              coverage="N/A"
              
              if [ -f "$dir/coverage.out" ]; then
                coverage=$(go tool cover -func="$dir/coverage.out" 2>/dev/null | grep total | awk '{print $3}' || echo "N/A")
              fi
              
              echo "| $module | $coverage |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Whole-repository aggregate across all modules' coverage.out.
          OVERALL=$(awk '
            /^mode:/ { next }
            { n=$(NF-1); c=$NF; total+=n; if (c+0>0) covered+=n }
            END { if (total>0) printf "%.1f%%", covered*100.0/total; else printf "N/A" }
          ' coverage-reports/coverage-safe-*/coverage.out 2>/dev/null || echo "N/A")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall (all SaFE modules combined): ${OVERALL}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Per-package (directory) breakdown for each module, folded to keep the
          # summary compact.
          echo "### Per-package coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in coverage-reports/coverage-safe-*/; do
            [ -d "$dir" ] || continue
            module=$(basename "$dir" | sed 's/coverage-safe-//')
            [ -f "$dir/coverage.out" ] || continue
            echo "<details><summary>${module}</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
            awk '
              /^mode:/ { next }
              {
                p=index($1, ":"); file=substr($1, 1, p-1);
                pos=0; for (i=length(file); i>0; i--) { if (substr(file,i,1)=="/") { pos=i; break } }
                d=substr(file, 1, pos-1);
                n=$(NF-1); c=$NF; tot[d]+=n; if (c+0>0) cov[d]+=n;
              }
              END { for (d in tot) printf "%s %.1f%%\n", d, cov[d]*100.0/tot[d] }
            ' "$dir/coverage.out" \
              | sed "s#github.com/AMD-AIG-AIMA/SAFE/##" \
              | sort \
              | while read -r pkg pct; do echo "| \`$pkg\` | $pct |" >> $GITHUB_STEP_SUMMARY; done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ==================== Failed Tests Table ====================
          echo "## ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Failed Test | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|----------|" >> $GITHUB_STEP_SUMMARY
          
          HAS_FAILURES=false
          
          # Extract failed tests from SaFE modules
          for dir in failed-tests-reports/failed-tests-safe-*/; do
            if [ -d "$dir" ]; then
              module=$(basename "$dir" | sed 's/failed-tests-safe-//')
              if [ -f "$dir/failed-tests.md" ]; then
                # Extract lines matching "--- FAIL: TestName (duration)"
                while IFS= read -r line; do
                  if [ -n "$line" ]; then
                    HAS_FAILURES=true
                    # Parse test name and duration from "--- FAIL: TestName (0.00s)"
                    test_name=$(echo "$line" | sed -E 's/^--- FAIL: ([^ ]+).*/\1/')
                    duration=$(echo "$line" | sed -E 's/.*\(([^)]+)\).*/\1/')
                    echo "| SaFE/$module | \`$test_name\` | $duration |" >> $GITHUB_STEP_SUMMARY
                  fi
                done < <(grep -E "^--- FAIL:" "$dir/failed-tests.md" 2>/dev/null || true)
              fi
            fi
          done
          
          if [ "$HAS_FAILURES" = "false" ]; then
            echo "| - | ✅ All tests passed | - |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with Coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('coverage-summary.md', 'utf8');
            
            // Add failed tests information
            if (fs.existsSync('failed-tests-summary.md')) {
              const failedTests = fs.readFileSync('failed-tests-summary.md', 'utf8');
              if (failedTests.includes('❌ Failed Tests')) {
                body += '\n\n---\n\n' + failedTests;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

