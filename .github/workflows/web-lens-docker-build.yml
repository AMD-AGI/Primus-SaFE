name: Build and Push Lens Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
    paths:
      - 'Web/apps/lens/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          TAG=$(date -u +'%Y%m%d%H%M')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Web/apps/lens
          file: ./Web/apps/lens/Dockerfile
          push: true
          tags: |
            docker.io/primussafe/primus-lens-web:${{ steps.tag.outputs.tag }}
            docker.io/primussafe/primus-lens-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Image pushed to Docker Hub"
          echo "Image: docker.io/primussafe/primus-lens-web:${{ steps.tag.outputs.tag }}"
          echo "Latest: docker.io/primussafe/primus-lens-web:latest"
