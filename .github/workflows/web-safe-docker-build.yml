name: Build and Push Safe Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
    paths:
      - 'Web/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          TAG=$(date -u +'%Y%m%d%H%M')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Web
          file: ./Web/Dockerfile
          push: true
          tags: |
            docker.io/primussafe/primus-safe-web:${{ steps.tag.outputs.tag }}
            docker.io/primussafe/primus-safe-web:latest
            quay.io/primussafe/primus-safe-web:${{ steps.tag.outputs.tag }}
            quay.io/primussafe/primus-safe-web:latest
          build-args: |
            VITE_MCP_BASE_URL=${{ secrets.VITE_MCP_BASE_URL }}
            VITE_MCP_API_KEY=${{ secrets.VITE_MCP_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Image pushed to Docker Hub and Quay.io (unified: SaFE + Lens)"
          echo "Docker Hub: docker.io/primussafe/primus-safe-web:${{ steps.tag.outputs.tag }}"
          echo "Quay.io: quay.io/primussafe/primus-safe-web:${{ steps.tag.outputs.tag }}"
