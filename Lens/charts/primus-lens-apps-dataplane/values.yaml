#
# Primus Lens Apps Data Plane - Configuration
#
# Data plane components:
# - Telemetry Collector: Log and metrics processing
# - Jobs: Job scheduling and management
# - Node Exporter: Node-level metrics (DaemonSet)
# - GPU Resource Exporter: GPU metrics
# - System Tuner: System optimization (DaemonSet)
# - AI Advisor: AI recommendations
#
# NOTE: Web console is part of control-plane, not data-plane
#

# ============================================================================
# Global Configuration
# ============================================================================
global:
  clusterName: "my-cluster"
  namespace: "primus-lens"
  
  imageRegistry:
    url: "docker.io"
    pullPolicy: "IfNotPresent"
    pullSecret: ""
  
  tracing:
    enabled: false
    endpoint: ""
    sampler: "traceidratio"
    samplerArg: "1.0"

# ============================================================================
# Infrastructure Dependencies
# ============================================================================
infrastructure:
  # Wait for PostgreSQL to be ready before starting apps that require DB
  # Set to true only when deploying alongside infrastructure for the first time
  waitForPostgres: false

# ============================================================================
# Data Plane Components
# Image tags: use "latest" or set via CI; align with current module builds.
# ============================================================================
apps:
  telemetryCollector:
    enabled: true
    image: "primussafe/telemetry-processor:latest"
    replicas: 1
    httpPort: 8989
    prometheusPort: 8990
    resources: {}
  
  jobs:
    enabled: true
    image: "primussafe/primus-lens-jobs:latest"
    replicas: 1
    httpPort: 8989
    grpcPort: 8991
    resources: {}
    config:
      environment: "production"
      defaultClusterName: ""  # default: global.clusterName
      prometheusPort: 8990
      controller:
        leaderElectionId: "primus-lens-core"
        metricsPort: 19193
        healthzPort: 19194
        pprofPort: 19195
      # ai_agent optional; omit or set endpoint to enable
      # ai_agent:
      #   name: "lens-agent-api"
      #   endpoint: "http://lens-agent-api:8000"
  
  nodeExporter:
    enabled: true
    image: "primussafe/primus-lens-node-exporter:latest"
    httpPort: 8989
    maxUnavailable: 10
    resources: {}
    # PySpyConfig: max_storage_size_mb (int), default 10240 = ~10GB
    pyspy:
      enabled: true
      maxStorageSizeMB: 10240
      fileRetentionDays: 7
      maxConcurrentJobs: 5
      defaultDuration: 30
      defaultRate: 100
  
  gpuResourceExporter:
    enabled: true
    image: "primussafe/gpu-resource-exporter:latest"
    replicas: 1
    httpPort: 8989
    grpcPort: 8991
    resources: {}
    config:
      loadK8SClient: true
      loadStorageClient: true
      prometheusPort: 8990
      controller:
        leaderElectionId: "primus-lens-gpu-resource"
        metricsPort: 19193
        healthzPort: 19194
        pprofPort: 19195
  
  systemTuner:
    enabled: true
    image: "primussafe/system-tuner:latest"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  
  # NOTE: web is part of control-plane, not data-plane
  # See primus-lens-apps-controlplane chart
  
  aiAdvisor:
    enabled: true
    image: "primussafe/ai-advisor:latest"
    replicas: 1
    httpPort: 8080
    healthPort: 8081
    logLevel: "info"
    resources:
      requests:
        cpu: "2000m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "2Gi"
    config:
      middleware:
        enableLogging: false

  imageAnalyzer:
    enabled: true
    image: "primussafe/image-analyzer:latest"
    replicas: 1
    httpPort: 8092
    healthPort: 8093
    logLevel: "info"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

# ============================================================================
# Service Account Configuration
# ============================================================================
serviceAccount:
  create: true
  name: "primus-lens-app"

