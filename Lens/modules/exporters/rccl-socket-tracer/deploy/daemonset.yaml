apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rccl-socket-tracer
  namespace: primus-lens
  labels:
    app: rccl-socket-tracer
spec:
  selector:
    matchLabels:
      app: rccl-socket-tracer
  template:
    metadata:
      labels:
        app: rccl-socket-tracer
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: tracer
          image: quay.io/primussafe/rccl-socket-tracer:latest
          imagePullPolicy: Always
          env:
            - name: TRACE_OUTPUT_DIR
              value: /var/log/rccl-tracer
            # Only trace pods in namespaces matching this substring
            - name: TRACE_NAMESPACE_FILTER
              value: control-plane-
            # Report send/recv calls slower than this (ms)
            - name: TRACE_SLOW_THRESHOLD_MS
              value: "100"
            - name: ANP_LIB_REL_PATH
              value: /opt/rocm-7.1.0/lib/librccl-anp.so
            - name: IBV_LIB_REL_PATH
              value: /lib/x86_64-linux-gnu/libibverbs.so.1
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # hostNetwork: avoid :9190 (often in use on nodes)
            - name: PROMETHEUS_ADDR
              value: :29190
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: sys-kernel
              mountPath: /sys/kernel
              readOnly: true
            - name: trace-output
              mountPath: /var/log/rccl-tracer
            - name: host-run
              mountPath: /host/run
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: sys-kernel
          hostPath:
            path: /sys/kernel
        - name: trace-output
          hostPath:
            path: /var/log/rccl-tracer
            type: DirectoryOrCreate
        - name: host-run
          hostPath:
            path: /run
