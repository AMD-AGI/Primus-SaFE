{{- if and .Values.claw .Values.claw.enable }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-claw-llm
  namespace: {{ .Release.Namespace }}
  labels:
    app: robust-claw-unified
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  ANTHROPIC_API_KEY:  "{{ default "" .Values.claw.anthropic_api_key }}"
  ANTHROPIC_BASE_URL: "{{ default "" .Values.claw.anthropic_base_url }}"
  OPENAI_API_KEY:     "{{ default "" .Values.claw.openai_api_key }}"
  SAFE_API_KEY:       "{{ default "" .Values.claw.safe_api_key }}"
{{- if not .Values.claw.db.existing_secret }}
  SAFE_DB_PASSWORD:   "{{ default "" .Values.claw.db.password }}"
{{- end }}
{{- if and .Values.claw.lens_db.enable (not .Values.claw.lens_db.existing_secret) }}
  LENS_DB_PASSWORD:   "{{ default "" .Values.claw.lens_db.password }}"
{{- end }}
{{- end }}
