apiVersion: v1
kind: Service
metadata:
  name: {{ include "fault-manager.fullname" . }}
  labels:
    {{- include "fault-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "fault-manager.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.restPort }}
      targetPort: rest
      protocol: TCP
      name: rest

