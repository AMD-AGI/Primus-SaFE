{{- if .Values.postgres.enabled }}
{{- $ns := .Values.global.namespace | default .Release.Namespace }}
{{- $reg := "" }}
{{- if .Values.global.imageRegistry }}{{ $reg = printf "%s/" .Values.global.imageRegistry }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: robust-logging-db
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: robust-logging-db
    app.kubernetes.io/part-of: primus-robust-logging
type: Opaque
stringData:
  # Consumed by robust-api (database.existingSecret) via key "password".
  password: {{ .Values.postgres.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: robust-logging-db
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: robust-logging-db
    app.kubernetes.io/part-of: primus-robust-logging
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: robust-logging-db
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robust-logging-db
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: robust-logging-db
    app.kubernetes.io/part-of: primus-robust-logging
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: robust-logging-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robust-logging-db
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ $reg }}{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.dbname | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: robust-logging-db
                  key: password
            # Keep PGDATA under a subdir of the emptyDir mount.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.dbname }}"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.dbname }}"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        # Ephemeral: this DB stores no logging data (startup-ping only).
        - name: data
          emptyDir: {}
{{- end }}
