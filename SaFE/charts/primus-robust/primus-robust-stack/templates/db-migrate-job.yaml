apiVersion: v1
kind: ConfigMap
metadata:
  name: robust-db-migrations
  namespace: {{ include "primus-robust.namespace" . }}
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: robust-db-migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  all.sql: |
{{ .Files.Get "migrations/all.sql" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: robust-db-migrate-{{ .Release.Revision | default "1" }}
  namespace: {{ include "primus-robust.namespace" . }}
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: robust-db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: robust-db-migrate
    spec:
      restartPolicy: OnFailure
      {{- if .Values.global.imageRegistry }}
      initContainers:
      - name: wait-for-db
        image: "{{ .Values.global.imageRegistry }}/busybox:latest"
        command: ["sh", "-c"]
        args:
        - |
          echo "Waiting for PostgreSQL to become available..."
          until nc -z robust-db-primary.{{ include "primus-robust.namespace" . }}.svc 5432; do
            echo "  DB not ready, retrying in 5s..."
            sleep 5
          done
          echo "PostgreSQL is available."
      {{- else }}
      initContainers:
      - name: wait-for-db
        image: busybox:latest
        command: ["sh", "-c"]
        args:
        - |
          echo "Waiting for PostgreSQL to become available..."
          until nc -z robust-db-primary.{{ include "primus-robust.namespace" . }}.svc 5432; do
            echo "  DB not ready, retrying in 5s..."
            sleep 5
          done
          echo "PostgreSQL is available."
      {{- end }}
      containers:
      - name: migrate
        {{- if .Values.global.imageRegistry }}
        image: "{{ .Values.global.imageRegistry }}/crunchydata/crunchy-postgres:ubi8-17.0-0"
        {{- else }}
        image: postgres:17-alpine
        {{- end }}
        command: ["sh", "-c"]
        args:
        - |
          echo "Running database migrations..."
          # -v ON_ERROR_STOP=1 makes psql exit non-zero on the first failing
          # statement. Without it a syntax error mid-way only emits a NOTICE
          # and the job still exits 0, leaving downstream tables missing and
          # the dataplane silently degraded (seen in core42: gpu_util_cache
          # never created because the PK clause referenced the unquoted
          # reserved word 'window', every later CREATE skipped).
          psql -v ON_ERROR_STOP=1 "$DATABASE_URI" -f /migrations/all.sql
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "Migrations completed successfully."
          else
            echo "Migration failed with exit code $RC"
            exit $RC
          fi
        env:
        - name: DATABASE_URI
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.existingSecret | default "robust-db-pguser-robust" }}
              key: uri
        volumeMounts:
        - name: migrations
          mountPath: /migrations
          readOnly: true
      volumes:
      - name: migrations
        configMap:
          name: robust-db-migrations
