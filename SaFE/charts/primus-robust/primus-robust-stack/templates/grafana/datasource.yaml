{{- if .Values.grafana.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: robust-victoriametrics
  namespace: {{ include "primus-robust.namespace" . }}
  labels:
    dashboards: "primus-robust"
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  instanceSelector:
    matchLabels:
      dashboards: "primus-robust"
  datasource:
    # Pin a stable uid so dashboards (which reference datasources by uid, not
    # name) keep working across helm re-installs. Without this the Grafana
    # operator auto-generates a random uid and any dashboard JSON that hard-
    # codes "uid": "..." ends up with "Datasource ... was not found".
    uid: {{ .Values.grafana.datasourceUID | default "robust-vm" }}
    name: VictoriaMetrics
    type: prometheus
    access: proxy
    # Data-plane observability is served by the standalone `api` service
    # (Service name robust-api), which exposes /api/v1/vm-proxy. The
    # robust-analyzer process now runs background workers only.
    url: http://robust-api.{{ include "primus-robust.namespace" . }}.svc:8085/api/v1/vm-proxy
    isDefault: true
    editable: true
    jsonData:
      tlsSkipVerify: true
      timeInterval: "30s"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: robust-postgres
  namespace: {{ include "primus-robust.namespace" . }}
  labels:
    dashboards: "primus-robust"
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  instanceSelector:
    matchLabels:
      dashboards: "primus-robust"
  datasource:
    uid: {{ .Values.grafana.postgresDatasourceUID | default "robust-pg" }}
    name: PostgreSQL
    type: postgres
    access: proxy
    url: {{ .Values.database.host | default "robust-db-primary.primus-robust.svc" }}:5432
    database: {{ .Values.database.dbname | default "robust" }}
    user: {{ .Values.database.user | default "robust" }}
    editable: true
    jsonData:
      sslmode: {{ .Values.database.sslmode | default "require" }}
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $__file{/etc/secrets/db/password}
{{- end }}
