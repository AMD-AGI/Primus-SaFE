{{- if and .Values.robust_claw_worker .Values.robust_claw_worker.enable }}
apiVersion: v1
kind: Secret
metadata:
  name: robust-claw-llm
  namespace: {{ .Values.robust_claw_worker.namespace }}
  labels:
    app: robust-claw
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  OPENAI_BASE_URL:    "{{ default "" .Values.robust_claw_worker.openai_base_url }}"
  OPENAI_API_KEY:     "{{ default "" .Values.robust_claw_worker.openai_api_key }}"
  ANTHROPIC_BASE_URL: "{{ default "" .Values.robust_claw_worker.anthropic_base_url }}"
  ANTHROPIC_API_KEY:  "{{ default "" .Values.robust_claw_worker.anthropic_api_key }}"
{{- end }}
