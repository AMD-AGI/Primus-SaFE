{{- if and .Values.robust_claw_worker .Values.robust_claw_worker.enable }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: robust-agent
  namespace: {{ .Values.robust_claw_worker.namespace }}
  labels:
    app: robust-claw
    app.kubernetes.io/managed-by: Helm
---
{{- if .Values.robust_claw_worker.rbac.cluster_admin }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-robust-claw-agent-admin
  labels:
    app: robust-claw
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: robust-agent
    namespace: {{ .Values.robust_claw_worker.namespace }}
{{- else if .Values.robust_claw_worker.rbac.custom_rules }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-robust-claw-agent
  labels:
    app: robust-claw
    app.kubernetes.io/managed-by: Helm
rules:
{{ toYaml .Values.robust_claw_worker.rbac.custom_rules | indent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-robust-claw-agent
  labels:
    app: robust-claw
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-robust-claw-agent
subjects:
  - kind: ServiceAccount
    name: robust-agent
    namespace: {{ .Values.robust_claw_worker.namespace }}
{{- end }}
{{- end }}
