apiVersion: v1
kind: Service
metadata:
  name: {{ include "telemetry-gateway.fullname" . }}
  labels:
    {{- include "telemetry-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "telemetry-gateway.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.devices.enabled }}
    - port: {{ .Values.service.grpcPort | default .Values.devices.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
