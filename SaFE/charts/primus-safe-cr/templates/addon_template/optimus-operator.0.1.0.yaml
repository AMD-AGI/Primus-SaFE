# RocServe (Optimus) Operator for SaFE — the OptimusDeployment analogue of the
# dynamo-operator addon. Installs the standalone RocServe operator that
# reconciles RocServeDeployment (rocserve.amd.com/v1alpha1) into Deployments /
# LeaderWorkerSets for the OptimusDeployment workload kind.
#
# Notes (read before deploy):
#   1. Self-contained: unlike dynamo-operator this does NOT depend on the NVIDIA
#      dynamo operator. It DOES reuse two existing SaFE addons:
#        - nats.1.3.2  : the OptimusDeployment template injects
#                        NATS_SERVER=nats://nats.primus-safe.svc:4222 and sets
#                        spec.nats.deploy=false, so the operator does NOT spin up
#                        a per-deployment NATS — it reuses the cluster NATS.
#        - lws.0.8.0   : required only for multi-node (numberOfNodes > 1) RSD
#                        services; the operator emits LeaderWorkerSet CRs that the
#                        existing LWS controller reconciles. Single-node /
#                        aggregated serving does not need it.
#   2. Harbor mirror requirements (ops to mirror before this Addon is applied;
#      <helm_registry> / <image_registry> come from values.global.* at render):
#         Helm chart (OCI): oci://<helm_registry>/primussafe/optimus-operator:0.1.0
#                 (source: Optimus/deploy/operator/helm/optimus-operator)
#         Image: <image_registry>/primussafe/optimus-kubernetes-operator:0.1.0
#                 (build: `make docker-build` in Optimus/deploy/operator)
#                 (distinct repo from the chart to avoid OCI tag collision)
#   3. CRD (rocserve.amd.com_rocservedeployments) is shipped in the chart's
#      crds/ directory and installed by helm before the operator Deployment.
#   4. No etcd: the OptimusDeployment template uses discoveryBackend=kubernetes,
#      so the server discovers workers through the in-cluster API server and the
#      operator provisions a per-deployment ServiceAccount + Role (workers patch
#      their own Pod annotation; the server lists/watches worker Pods). Nothing
#      extra to install. The workload entryPoints must pass
#      `--discovery-backend kubernetes` (no --etcd-endpoint).
#
# Default-addon: like dynamo-operator, every registered Cluster auto-installs
# this via ClusterReconciler.guaranteeDefaultAddon. Remove the
# `primus-safe.addon.default` label to make it opt-in per cluster instead.
#

apiVersion: amd.com/v1
kind: AddonTemplate
metadata:
  labels:
    primus-safe.display.name: "optimus-operator.0.1.0"
    app.kubernetes.io/managed-by: Helm
    primus-safe.addon.default: ""
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  name: optimus-operator.0.1.0
spec:
  category: plugin
  description: RocServe (Optimus) Kubernetes operator. Reconciles RocServeDeployment (rocserve.amd.com/v1alpha1) into Deployments / LeaderWorkerSets for aggregated and disaggregated (prefill/decode) LLM serving on AMD MI300X. Underlying resource for the OptimusDeployment workload kind. Self-contained — does not require the NVIDIA dynamo operator; reuses the cluster NATS (nats.1.3.2) and, for multi-node, the LWS controller (lws.0.8.0).
  # OCI helm chart mirrored on SaFE Harbor (ops to mirror, see header note 2).
  # Upstream source path: Optimus/deploy/operator/helm/optimus-operator
  url: oci://{{ .Values.global.helm_registry }}/primussafe/optimus-operator
  version: 0.1.0
  type: helm
  helmDefaultNamespace: optimus-system
  helmDefaultValues: |
    replicaCount: 1

    image:
      # Registry host resolution: the primus-safe-cr chart only defines
      # global.helm_registry (see its values.yaml); global.image_registry is
      # NOT a cr-chart value, so referencing it alone renders an empty host
      # (that was the original InvalidImageName bug). Fall back to helm_registry
      # — the same host the chart `url` below uses and the one reliably set on
      # the management plane (harbor.core42.primus-safe.amd.com; chart default
      # registry-1.docker.io, where the image is also mirrored).
      #
      # NOTE: image repo is optimus-kubernetes-operator (NOT optimus-operator):
      # the helm chart OCI artifact lives at primussafe/optimus-operator, so the
      # image must use a distinct repo name or the chart push clobbers it
      # (mirrors dynamo: image=dynamo-kubernetes-operator, chart=dynamo-operator).
      repository: {{ .Values.global.image_registry | default .Values.global.helm_registry }}/primussafe/optimus-kubernetes-operator
      # Operator image tag. 0.1.3 = surge-free RollingUpdate (maxSurge=0,
      # maxUnavailable=1) for GPU workers instead of Recreate.
      tag: "0.1.3"
      pullPolicy: IfNotPresent

    leaderElection:
      enabled: true

    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

    rbac:
      create: true
    serviceAccount:
      create: true

    # SaFE Harbor allows anonymous pull for primussafe/* repos.
    imagePullSecrets: []
