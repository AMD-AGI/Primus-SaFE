apiVersion: amd.com/v1
kind: AddonTemplate
metadata:
  labels:
    primus-safe.display.name: "primus-robust.1.0.0"
    app.kubernetes.io/managed-by: Helm
    primus-safe.addon.default: ""
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    # The data-plane robust stack ships a single binary (robust-analyzer)
    # that exposes robust-api routes under /api/v1. There is no separate
    # Service called "robust-api" — the SaFE resource-manager reads these
    # annotations and copies them onto the Cluster CR as the
    # primus-safe.amd.com/robust-api-endpoint, so pointing at a non-existent
    # service means every cross-cluster call (logs proxy, posttrain lens,
    # workload UID resolution, ...) fails with connection refused.
    primus-safe.amd.com/robust-api-service: "robust-analyzer.primus-robust.svc"
    primus-safe.amd.com/robust-api-port: "8085"
  name: primus-robust.1.0.0
spec:
  category: system
  description: AMD Primus Robust - Self-contained data-plane stack providing GPU fault management, observability (VictoriaMetrics, OpenSearch, FluentBit), workload analytics, and training performance monitoring.
  url: oci://{{ .Values.global.helm_registry }}/primussafe/primus-robust
  version: 1.0.0
  type: helm
  required: false
  helmDefaultNamespace: primus-robust
  helmDefaultValues: |
    global:
      storageClass: ""
      imageRegistry: ""
      image:
        registry: ""
    primus-robust-stack:
      database:
        storageSize: "50Gi"
      metrics:
        victoriametrics:
          vmstorage:
            size: 100Gi
      logs:
        opensearch:
          nodePools:
            - name: "nodes"
              replicas: 3
              roles:
                - master
                - data
                - ingest
              diskSize: 100Gi
