apiVersion: amd.com/v1
kind: ResourceTemplate
metadata:
  name: ray-job
  labels:
    app.kubernetes.io/managed-by: Helm
    primus-safe.workload.version: v1
  annotations:
    primus-safe.workload.kind: "RayJob"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  groupVersionKind:
    group: ray.io
    version: v1
    kind: RayJob
  resourceSpecs:
    - prePaths:
        - spec
      templatePaths:
        - submitterPodTemplate
    - prePaths:
        - spec
        - rayClusterSpec
        - headGroupSpec
      defaultReplica: 1
      templatePaths:
        - template
    - prePaths:
        - spec
        - rayClusterSpec
        - workerGroupSpecs
        - "0"
      templatePaths:
        - template
      replicasPaths:
        - replicas
      maxReplicasPaths:
        - maxReplicas
      minReplicasPaths:
        - minReplicas
    - prePaths:
        - spec
        - rayClusterSpec
        - workerGroupSpecs
        - "1"
      templatePaths:
        - template
      replicasPaths:
        - replicas
      maxReplicasPaths:
        - maxReplicas
      minReplicasPaths:
        - minReplicas
  resourceStatus:
    prePaths:
      - status
    messagePaths:
      - message
    reasonPaths:
      - reason
    phases:
      - matchExpressions:
          jobStatus: 'SUCCEEDED'
          jobDeploymentStatus: 'Complete'
        phase: K8sSucceeded
      - matchExpressions:
          jobStatus: 'FAILED'
        phase: K8sFailed
      - matchExpressions:
          jobDeploymentStatus: 'Failed'
        phase: K8sFailed
      - matchExpressions:
          jobDeploymentStatus: 'ValidationFailed'
        phase: K8sFailed
      - matchExpressions:
          jobStatus: 'RUNNING'
          jobDeploymentStatus: 'Running'
        phase: K8sRunning
      - matchExpressions:
          jobStatus: 'STOPPED'
        phase: AdminStopped
  activeReplica:
    prePaths:
      - status
    replicaPath: succeeded
---
# DynamoDeployment — wraps the upstream nvidia.com/v1alpha1 DynamoGraphDeployment
# (DGD) CR. The dispatcher's generic flow renders the user's Workload.Spec.Resources
# into the five role-agnostic service slots (role0..role4) declared by the
# matching ConfigMap template (charts/primus-safe/templates/configmap/
# dynamo_deployment_template.yaml). After the generic flow, dispatcher_help.go::
# normalizeDynamoDGD() rewrites each slot's key (role<i> -> Frontend / Worker /
# PrefillWorker / DecodeWorker / Planner / Epp) based on the user's
# `primus-safe.dynamo.service-roles` annotation and injects role-specific
# componentType / subComponentType / ports / env / disagg args.
#
# Phase matching uses the top-level `status.state` enum (initializing | pending |
# successful | failed) exposed by the DGD controller — this is the most stable
# DGD-wide signal. The per-condition `Ready` and detailed reason strings vary
# across DGD operator versions and are dynamic, so they are intentionally not
# consumed here. activeReplica is left unset because DGD does not expose a
# top-level numeric aggregate; SaFE upstream layers aggregate per-service replica
# counts from `status.services[*]` when needed.
apiVersion: amd.com/v1
kind: ResourceTemplate
metadata:
  name: dynamo-deployment
  labels:
    app.kubernetes.io/managed-by: Helm
    primus-safe.workload.version: v1
  annotations:
    primus-safe.workload.kind: "DynamoDeployment"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  groupVersionKind:
    group: nvidia.com
    version: v1alpha1
    kind: DynamoGraphDeployment
  # Five role-agnostic slots. The dispatcher's generic flow maps user Resources[i]
  # to slot[i] strictly by index. ResourceSpecs with index >= len(Resources) are
  # auto-removed by the dispatcher (RemoveNestedField). normalizeDynamoDGD then
  # renames the surviving role<i> keys to the user-requested service roles.
  resourceSpecs:
    - prePaths:
        - spec
        - services
        - role0
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role1
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role2
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role3
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role4
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
  resourceStatus:
    # Match the top-level DGD status object (single map, not an array).
    # The matcher walks `phases` top-down and picks the first match.
    prePaths:
      - status
    messagePaths:
      - state
    reasonPaths:
      - state
    phases:
      - matchExpressions:
          state: 'successful'
        phase: K8sRunning
      - matchExpressions:
          state: 'failed'
        phase: K8sFailed
      - matchExpressions:
          state: 'pending'
        phase: K8sPending
      - matchExpressions:
          state: 'initializing'
        phase: K8sPending
---
# InferaDeployment — Infera analogue of the DynamoDeployment ResourceTemplate
# above. Wraps the infera.amd.com/v1alpha1 InferaDeployment (IDEP) CR
# reconciled by the standalone Infera operator. The dispatcher's generic flow
# renders Workload.Spec.Resources into the five role slots (role0..role4) of the
# matching ConfigMap template (charts/primus-safe/templates/configmap/
# infera_deployment_template.yaml), injecting image/entrypoint/resources into
# spec.services.role<i>.extraPodSpec.containers[main]. dispatcher_help.go::
# normalizeInferaIDEP() then rewrites each slot's componentType (server|worker)
# and role (mixed|prefill|decode) from the primus-safe.infera.service-roles
# annotation. Phase matching uses the IDEP top-level status.state enum
# (initializing | pending | ready | failed) exposed by the Infera operator.
apiVersion: amd.com/v1
kind: ResourceTemplate
metadata:
  name: infera-deployment
  labels:
    app.kubernetes.io/managed-by: Helm
    primus-safe.workload.version: v1
  annotations:
    primus-safe.workload.kind: "InferaDeployment"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  groupVersionKind:
    group: infera.amd.com
    version: v1alpha1
    kind: InferaDeployment
  resourceSpecs:
    - prePaths:
        - spec
        - services
        - role0
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role1
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role2
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role3
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
    - prePaths:
        - spec
        - services
        - role4
      templatePaths:
        - extraPodSpec
      replicasPaths:
        - replicas
  resourceStatus:
    prePaths:
      - status
    messagePaths:
      - state
    reasonPaths:
      - state
    phases:
      - matchExpressions:
          state: 'ready'
        phase: K8sRunning
      - matchExpressions:
          state: 'failed'
        phase: K8sFailed
      - matchExpressions:
          state: 'pending'
        phase: K8sPending
      - matchExpressions:
          state: 'initializing'
        phase: K8sPending
---
