{{- if .Values.telemetryProcessor.enabled }}
apiVersion: fluentbit.fluent.io/v1alpha2
kind: ClusterOutput
metadata:
  name: primus-robust-log-processor
  labels:
    fluentbit.fluent.io/enabled: "true"
spec:
  match: "*"
  http:
    host: {{ .Values.telemetryProcessor.host }}
    port: {{ .Values.telemetryProcessor.port }}
    uri: v1/logs
    format: json
{{- end }}
