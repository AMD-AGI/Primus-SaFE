{{- if and .Values.opensearch.enabled .Values.opensearch.security.provideConfig }}
{{- /*
  Stable admin credentials the opensearch-operator uses to reach the cluster
  (adminCredentialsSecret) and that FluentBit + the SaFE apiserver authenticate
  with. The username/password here MUST match the admin user defined in the
  securityConfig secret (same opensearch.security.adminUsername/adminPassword).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.opensearch.name }}-admin
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/part-of: primus-safe-observability
type: Opaque
stringData:
  username: {{ .Values.opensearch.security.adminUsername | quote }}
  password: {{ .Values.opensearch.security.adminPassword | quote }}
{{- end }}
