{{- /*
  Only needed when the operator manages the (demo) security config itself. When
  we provide our own securityConfigSecret (opensearch.security.provideConfig),
  the operator applies it via its own securityadmin job, so this post-install
  fix-job is redundant and would race/conflict -- skip it.
*/}}
{{- if and .Values.opensearch.enabled (not .Values.opensearch.security.provideConfig) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.opensearch.name }}-securityconfig-fix
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/name: {{ .Values.opensearch.name }}-securityconfig-fix
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 20
  # Allow up to 20m for OpenSearch to become reachable on a fresh cluster
  # (cold image pull + operator reconcile + startup). Must be >= the Helm
  # --timeout used to install this chart, or the hook Job dies first.
  activeDeadlineSeconds: 1200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.opensearch.name }}-securityconfig-fix
    spec:
      restartPolicy: OnFailure
      containers:
      - name: securityconfig
        {{- if .Values.global.imageRegistry }}
        image: "{{ .Values.global.imageRegistry }}/opensearchproject/opensearch:{{ .Values.opensearch.version }}"
        {{- else }}
        image: "opensearchproject/opensearch:{{ .Values.opensearch.version }}"
        {{- end }}
        command: ["sh", "-c"]
        args:
        - |
          ADMIN=/usr/share/opensearch/plugins/opensearch-security/tools/securityadmin.sh
          chmod +x $ADMIN
          HOST="{{ .Values.opensearch.name }}.{{ .Values.global.namespace }}.svc"
          echo "Waiting for OpenSearch at $HOST:9200..."
          until curl -sk "https://$HOST:9200" >/dev/null 2>&1; do
            echo "  Not ready, retrying in 15s..."
            sleep 15
          done
          echo "OpenSearch is reachable, running securityadmin..."
          $ADMIN \
            -cacert /certs/ca.crt -cert /certs/tls.crt -key /certs/tls.key \
            -cd /usr/share/opensearch/config/opensearch-security \
            -icl -nhnv \
            -h "$HOST" -p 9200
        volumeMounts:
        - name: admin-cert
          mountPath: /certs
          readOnly: true
      volumes:
      - name: admin-cert
        secret:
          secretName: {{ .Values.opensearch.name }}-admin-cert
{{- end }}
