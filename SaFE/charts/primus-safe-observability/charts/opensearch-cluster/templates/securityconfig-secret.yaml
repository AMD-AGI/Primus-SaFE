{{- if and .Values.opensearch.enabled .Values.opensearch.security.provideConfig }}
{{- /*
  Chart-managed OpenSearch security configuration. Providing this (plus the
  admin-credentials secret) makes the opensearch-operator's reconcile
  idempotent: it stops regenerating a random admin password + reapplying the
  demo securityconfig on every loop, which is what triggered a RollingRestart
  during initial shard recovery and wedged the cluster.

  Based verbatim on the standard opensearch-security demo config; only the admin
  user's bcrypt hash is templated from opensearch.security.adminPassword (sprig
  htpasswd -> strip the "user:" prefix). Keep this minimal + demo-faithful to
  avoid locking out authentication.
*/}}
{{- $user := .Values.opensearch.security.adminUsername }}
{{- $hash := (htpasswd $user .Values.opensearch.security.adminPassword) | trimPrefix (printf "%s:" $user) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.opensearch.name }}-securityconfig
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: opensearch
    app.kubernetes.io/part-of: primus-safe-observability
type: Opaque
stringData:
  config.yml: |
    _meta:
      type: "config"
      config_version: 2
    config:
      dynamic:
        http:
          anonymous_auth_enabled: false
        authc:
          basic_internal_auth_domain:
            description: "Authenticate via HTTP Basic against the internal users database"
            http_enabled: true
            transport_enabled: true
            order: 4
            http_authenticator:
              type: basic
              challenge: true
            authentication_backend:
              type: intern
  internal_users.yml: |
    _meta:
      type: "internalusers"
      config_version: 2
    {{ $user }}:
      hash: "{{ $hash }}"
      reserved: true
      backend_roles:
      - "admin"
      description: "Chart-managed admin user"
  roles.yml: |
    _meta:
      type: "roles"
      config_version: 2
  roles_mapping.yml: |
    _meta:
      type: "rolesmapping"
      config_version: 2
    all_access:
      reserved: false
      backend_roles:
      - "admin"
      description: "Map the admin backend role to all_access"
    security_rest_api_access:
      reserved: false
      backend_roles:
      - "admin"
  action_groups.yml: |
    _meta:
      type: "actiongroups"
      config_version: 2
  tenants.yml: |
    _meta:
      type: "tenants"
      config_version: 2
{{- end }}
