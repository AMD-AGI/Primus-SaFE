apiVersion: v1
data:
  config.yaml: |
    global:
      # Image pull secret for primus-safe. If set to empty, the secret will not be used.
      image_secret: {{ .Values.global.image_pull_secret }}
      image_registry: {{ .Values.global.image_registry }}
      domain: {{ .Values.global.domain }}
      sub_domain: {{ .Values.global.sub_domain }}
    net:
      # RDMA device name
      rdma_name: {{ .Values.net.rdma_name }}
      # Ingress component name selected during install.sh
      ingress: {{ .Values.net.ingress }}
    crypto:
      # Whether to enable crypto. This will be used to encrypt the user token.
      enable: true
      # The path of crypto secret
      secret_path: {{ default "/etc/secrets/crypto" (default .Values.crypto).secret_path }}
    server:
      # The port of apiserver 
      port: {{ default 8088 (default .Values.apiserver).port }}
    health_check:
      # Whether to enable health check
      enable: {{ default true (default .Values.k8s).enable_health_check }}
      # The port of health check
      port: {{ default 8082 (default .Values.apiserver).health_port }}
    metrics:
      enable: true
      port: {{ default 8000 (default .Values.job_manager).metrics_port }}
    workspace:
      # The percentage of memory reserved for the system.
      mem_reserve_percent: {{ default 0.02 (default .Values.workspace).mem_reserve_percent }}
      # The percentage of cpu reserved for the system.
      cpu_reserve_percent: {{ default 0.06 (default .Values.workspace).cpu_reserve_percent }}
      # The percentage of storage reserved for the system.
      ephemeral_store_reserve_percent: {{ default 0.1 (default .Values.workspace).ephemeral_store_reserve_percent }}
    workload:
      # The maximum percentage of ephemeral storage that can be used by a workload.
      max_ephemeral_store_percent: {{ default 0.6 (default .Values.workload).max_ephemeral_store_percent }}
    db:
      # Whether to enable database, The database will store some historical data regarding workloads, faults, and ops jobs.
      enable: {{ .Values.db.enable }}
      # The path of database secret
      secret_path: {{ default "/etc/secrets/db" (default .Values.db).secret_path }}
      # The ssl mode of db
      ssl_mode: {{ default "require" (default .Values.db).ssl_mode }}
    opensearch:
      # Whether to enable opensearch, it is used for log search.
      enable: {{ .Values.opensearch.enable }}
      # The path of opensearch secret
      secret_path: {{ .Values.opensearch.secret_path }}
      # The endpoint of opensearch
      endpoint: {{ .Values.opensearch.endpoint }}
      # The prefix of index
      prefix: {{ .Values.opensearch.prefix }}
      # OpenSearch username and password are optional; either use them or the secret above
      username: "{{ default "" (default .Values.opensearch).username }}"
      password: "{{ default "" (default .Values.opensearch).password }}"
    ssh:
      # Whether to enable ssh, Users can log in directly to their own pods.
      enable: {{ .Values.ssh.enable }}
      server_ip: "{{ default "" (default .Values.ssh).server_ip }}"
      # The port for ssh
      server_port: {{ default 2222 (default .Values.ssh).port }}
      # The secret for ssh, which contains the private key
      secret_path: {{ default "/etc/secrets/ssh" (default .Values.ssh).secret_path }}
    s3:
      # Whether to enable s3, it is used to download logs
      enable: {{ .Values.s3.enable }}
      # The path of s3 secret
      secret_path: {{ .Values.s3.secret_path }}
    user:
      # Users can log in to the system without a token, intended for internal customers
      token_required: {{ .Values.user.token_required }}
      # The expiration time of the token(only for local token), in seconds.
      token_expire: 604800
    sso:
      # The secret for sso, which contains the id, secret, endpoint and redirect_uri
      secret_path: {{ .Values.sso.secret_path }}
      # Whether to enable sso
      enable: {{ .Values.sso.enable }}
    cicd:
      enable: {{ .Values.cicd.enable }}
      controller_name: {{ .Values.cicd.controller_name }}
    monarch:
      enable: {{ .Values.monarch.enable }}
    ops_job:
      # Opsjob download image version. used for download file
      download_image: "{{ .Values.global.image_registry }}/primussafe/{{ .Values.ops_job.download_image }}"
    cd:
      # Whether deployment requests require approval from another user
      require_approval: {{ default false (default .Values.cd).require_approval }}
      components: {{ .Values.cd.components }}
    notification:
      enable: {{ or (and .Values.notification .Values.notification.email .Values.notification.email.smtp_host) (and .Values.notification .Values.notification.email_relay .Values.notification.email_relay.enable) | default false }}
      secret_path: /etc/secrets/notification
    tracing:
      # Whether to enable OpenTelemetry tracing
      enable: {{ default true (default dict .Values.tracing).enable }}
      # Tracing mode: "all" (record all requests) or "error_only" (only record failed requests)
      mode: {{ default "error_only" (default dict .Values.tracing).mode }}
      # Sampling ratio for exporting traces (0.0 to 1.0)
      sampling_ratio: {{ default 1.0 (default dict .Values.tracing).sampling_ratio }}
      # OTLP exporter endpoint (e.g., localhost:4317 for gRPC)
      otlp_endpoint: {{ default "otel-collector-collector.primus-safe.svc.cluster.local:4317" (default dict .Values.tracing).otlp_endpoint }}
    {{- if .Values.a2a }}
    a2a:
      scanner:
        enable: {{ default false .Values.a2a.scanner_enable }}
        interval_seconds: {{ default 60 .Values.a2a.scanner_interval }}
        namespaces:
{{- if hasKey .Values.a2a "scanner_namespaces" }}
{{ toYaml .Values.a2a.scanner_namespaces | nindent 10 }}
{{- else }}
          - primus-safe
{{- end }}
        label_selector: "a2a.primus.io/enabled=true"
    {{- end }}
    {{- if or .Values.proxy .Values.langfuse_proxy }}
    proxy:
      services:
        {{- /* Render existing user-supplied services one item at a time so that
              an empty list doesn't collapse to flow-style `[]`, which would
              break syntax when langfuse appends to it. */}}
        {{- if and .Values.proxy .Values.proxy.services }}
        {{- range .Values.proxy.services }}
        - {{ toYaml . | nindent 10 | trim }}
        {{- end }}
        {{- end }}
        {{- if and .Values.langfuse_proxy .Values.langfuse_proxy.enable }}
        - name: langfuse
          prefix: /api/v1/langfuse
          target: {{ .Values.langfuse_proxy.target }}
          enabled: true
        {{- end }}
    {{- if and .Values.langfuse_proxy .Values.langfuse_proxy.enable }}
    langfuse_proxy:
      secret_path: {{ default "/etc/secrets/langfuse-proxy" .Values.langfuse_proxy.secret_path }}
    {{- end }}
    {{- end }}
    llm_gateway:
      # Whether to enable LLM Gateway (SaFE API Key -> LiteLLM Virtual Key binding)
      enabled: {{ default true (default dict .Values.llm_gateway).enabled }}
      # Path to the secret directory containing litellm_admin_key, litellm_endpoint, litellm_team_id
      secret_path: {{ default "/etc/secrets/llm-gateway" (default dict .Values.llm_gateway).secret_path }}
    model_optimization:
      # PrimusClaw HTTP v1 root: explicit URL, or secret file claw_base_url, or derived https://<sub>.<domain>/claw-api/v1.
      claw_base_url: "{{ default "" (default dict .Values.model_optimization).claw_base_url }}"
      claw_agent_id: "{{ default "agent_default" (default dict .Values.model_optimization).claw_agent_id }}"
      secret_path: {{ default "" (default dict .Values.model_optimization).secret_path | quote }}
      default_workspace: "{{ default "control-plane-sandbox" (default dict .Values.model_optimization).default_workspace }}"
      max_concurrent: {{ default 5 (default dict .Values.model_optimization).max_concurrent }}
    mcp:
      # Whether to enable MCP (Model Context Protocol) server for AI assistant integration
      enabled: {{ default true (default dict .Values.mcp).enabled }}
      base_path: {{ default "/api/v1/mcp" (default dict .Values.mcp).base_path }}
      instructions: {{ default "SaFE API Server - GPU Cluster Management Tools via MCP" (default dict .Values.mcp).instructions | quote }}
      # CORS allowlist; empty = same-origin only.
      allowed_origins:
{{- range default (list) (default dict .Values.mcp).allowed_origins }}
        - {{ . | quote }}
{{- end }}
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
