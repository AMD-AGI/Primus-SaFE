apiVersion: v1
kind: ConfigMap
metadata:
  name: amd-monarch-client-template
  namespace: {{ .Release.Namespace }}
  labels:
    primus-safe.workload.version: v1
    primus-safe.workload.kind: MonarchClient
    app.kubernetes.io/managed-by: Helm
  annotations:
    # The main container name should match the configuration defined in the template below
    primus-safe.main.container: main
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
data:
  template: |
    apiVersion: v1
    kind: Pod
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      enableServiceLinks: true
      schedulerName: default-scheduler
      serviceAccount: monarch-client
      serviceAccountName: monarch-client
      containers:
        - name: main
          image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.monarch.image }}
          imagePullPolicy: Always
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          env:
            # TorchFT timeout settings (increase from default 60s to reduce commit failures)
            - name: TORCHFT_TIMEOUT_SEC
              value: "300"
            - name: TORCHFT_QUORUM_TIMEOUT_SEC
              value: "300"
            - name: TORCHFT_CONNECT_TIMEOUT_SEC
              value: "120"
            - name: MONARCH_PORT
              value: "26600"
            - name: NCCL_SOCKET_IFNAME
              value: "{{ .Values.net.nccl_socket_ifname }}"
            - name: GLOO_SOCKET_IFNAME
              value: "{{ .Values.net.nccl_socket_ifname }}"
            - name: NCCL_IB_HCA
              value: "{{ .Values.net.nccl_ib_hca }}"
            - name: NCCL_IB_TIMEOUT
              value: "23"
            - name: NCCL_IB_RETRY_CNT
              value: "11"
            - name: NCCL_IB_QPS_PER_CONNECTION
              value: "1"
            - name: NCCL_CROSS_NIC
              value: "0"
            - name: NCCL_CHECKS_DISABLE
              value: "1"
            - name: HSA_ENABLE_SDMA
              value: "1"
            - name: NCCL_IB_SL
              value: "0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName