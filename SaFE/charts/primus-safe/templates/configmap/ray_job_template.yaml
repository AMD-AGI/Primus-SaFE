apiVersion: v1
kind: ConfigMap
metadata:
  name: amd-ray-job-template
  namespace: {{ .Release.Namespace }}
  labels:
    primus-safe.workload.version: v1
    primus-safe.workload.kind: RayJob
    app.kubernetes.io/managed-by: Helm
  annotations:
    # The main container name should match the configuration defined in the template below
    primus-safe.main.container: main
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
data:
  template: |
    apiVersion: ray.io/v1
    kind: RayJob
    spec:
      shutdownAfterJobFinishes: true
      ttlSecondsAfterFinished: 10
      backoffLimit: 3
      submissionMode: K8sJobMode
      submitterPodTemplate:
        spec:
          dnsPolicy: ClusterFirstWithHostNet
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                    - key: ray.io/node-type
                      operator: In
                      values:
                      - head
                  topologyKey: kubernetes.io/hostname
          initContainers:
            - name: preprocess
              image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c", "cp -r /preprocess/* /shared-data/"]
              securityContext:
                capabilities:
                  add: [ "IPC_LOCK" ]
              resources:
                limits:
                  cpu: 1000m
                  memory: 128Mi
              volumeMounts:
                - name: shared-data
                  mountPath: /shared-data
          containers:
            - name: ray-job-submitter
              # Do NOT set image: SaFE injects the same main image (sglang) used
              # by head/worker, which provides the ray CLI. Hard-coding the
              # preprocess image would not have ray installed.
              #
              # We override command/args because some sglang images ship
              # click==8.3.x, which is incompatible with ray==2.44.1's
              # add_command_alias (copy.deepcopy of a Sentinel raises ValueError).
              # As a side effect KubeRay 1.4 stops injecting its default
              # `ray job submit ... && ray job logs --follow` flow once a user
              # command exists, so we replicate it explicitly below.
              #
              # ray[default]==2.44.1 is required: the ray jobs CLI/SDK depend on
              # the `default` extras and some sglang images do not ship them,
              # which would otherwise raise:
              #   RuntimeError: The Ray jobs CLI & SDK require the
              #                 ray[default] installation
              command: ["/bin/bash", "-ce", "--"]
              args:
                - |
                  set -e
                  echo '[wrapper] installing click<8.3.0 + ray[default] (skip if already satisfied)'
                  pip install --quiet 'click<8.3.0' 'ray[default]==2.44.1' 2>/dev/null || true
                  ADDR="http://${RAY_DASHBOARD_ADDRESS}"
                  ENTRYPOINT="$(echo "${RAY_JOB_ENTRYPOINT}" | base64 -d)"
                  echo "[wrapper] ADDR=${ADDR} SUB_ID=${RAY_JOB_SUBMISSION_ID}"
                  echo "[wrapper] ENTRYPOINT=${ENTRYPOINT}"
                  if ! ray job status --address "$ADDR" "$RAY_JOB_SUBMISSION_ID" >/dev/null 2>&1; then
                    eval ray job submit --address "$ADDR" --no-wait \
                      --submission-id "$RAY_JOB_SUBMISSION_ID" -- "$ENTRYPOINT"
                  fi
                  ray job logs --address "$ADDR" --follow "$RAY_JOB_SUBMISSION_ID"
              volumeMounts:
                - name: shared-data
                  mountPath: /shared-data
          schedulerName: kube-scheduler-plugins
          volumes:
            - name: shared-data
              emptyDir: {}
          restartPolicy: Never
      rayClusterSpec:
        headGroupSpec:
          template:
            metadata:
              labels:
                primus-safe.amd.com/ray-role: head
            spec:
              dnsPolicy: ClusterFirstWithHostNet
              initContainers:
              - name: preprocess
                image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c", "cp -r /preprocess/* /shared-data/"]
                securityContext:
                  capabilities:
                    add: [ "IPC_LOCK" ]
                resources:
                  limits:
                    cpu: 1000m
                    memory: 128Mi
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
              containers:
              - name: main
                env:
                - name: NCCL_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: GLOO_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: NCCL_IB_HCA
                  value: "{{ .Values.net.nccl_ib_hca }}"
                - name: NCCL_IB_TIMEOUT
                  value: "23"
                - name: NCCL_IB_RETRY_CNT
                  value: "11"
                - name: NCCL_IB_QPS_PER_CONNECTION
                  value: "1"
                - name: NCCL_CROSS_NIC
                  value: "0"
                - name: NCCL_CHECKS_DISABLE
                  value: "1"
                - name: HSA_ENABLE_SDMA
                  value: "1"
                - name: NCCL_IB_SL
                  value: "0"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.name
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.uid
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: status.podIP
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                ports:
                - containerPort: 6379
                  name: gcs-server
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 18081      
                  name: metrics
                  protocol: TCP
                imagePullPolicy: IfNotPresent
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
                  - name: podinfo
                    mountPath: /etc/podinfo
                    readOnly: true
              schedulerName: kube-scheduler-plugins
              volumes:
                - name: shared-data
                  emptyDir: {}
                - name: podinfo
                  downwardAPI:
                    items:
                    - path: "labels"
                      fieldRef:
                        fieldPath: metadata.labels
              terminationGracePeriodSeconds: 15
        workerGroupSpecs:
        - groupName: "1"
          template:
            spec:
              dnsPolicy: ClusterFirstWithHostNet
              initContainers:
              - name: preprocess
                image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c", "cp -r /preprocess/* /shared-data/"]
                securityContext:
                  capabilities:
                    add: [ "IPC_LOCK" ]
                resources:
                  limits:
                    cpu: 1000m
                    memory: 128Mi
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
              # Replaces KubeRay's default wait-gcs-ready init (disabled via
              # ENABLE_INIT_CONTAINER_INJECTION=false on the operator) because the
              # default runs `ray health-check`, which loops forever on sglang
              # images carrying click==8.3.x with ray==2.44.1. Name MUST stay
              # wait-gcs-ready so that even if KubeRay re-enables injection later
              # it skips the same-named container instead of duplicating it.
              - name: wait-gcs-ready
                image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
                imagePullPolicy: IfNotPresent
                command: ["/usr/bin/bash", "-c"]
                args:
                  - |
                    set -u
                    HOST="${FQ_RAY_IP}"
                    PORT=6379
                    echo "waiting for GCS at ${HOST}:${PORT}"
                    SECONDS=0
                    while true; do
                      if timeout 2 bash -c "exec 3<>/dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                        echo "GCS is ready (TCP reachable after ${SECONDS}s)."
                        break
                      fi
                      echo "${SECONDS}s elapsed: waiting for GCS to be ready..."
                      SECONDS=$((SECONDS+5))
                      sleep 5
                    done
                resources:
                  requests:
                    cpu: 100m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 128Mi
              containers:
              - name: main
                env:
                - name: NCCL_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: GLOO_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: NCCL_IB_HCA
                  value: "{{ .Values.net.nccl_ib_hca }}"
                - name: NCCL_IB_TIMEOUT
                  value: "23"
                - name: NCCL_IB_RETRY_CNT
                  value: "11"
                - name: NCCL_IB_QPS_PER_CONNECTION
                  value: "1"
                - name: NCCL_CROSS_NIC
                  value: "0"
                - name: NCCL_CHECKS_DISABLE
                  value: "1"
                - name: HSA_ENABLE_SDMA
                  value: "1"
                - name: NCCL_IB_SL
                  value: "0"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.name
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.uid
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: status.podIP
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                imagePullPolicy: IfNotPresent
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
                  - name: podinfo
                    mountPath: /etc/podinfo
                    readOnly: true
                ports:
                  - containerPort: 18081
                    name: metrics
                    protocol: TCP
              schedulerName: kube-scheduler-plugins
              volumes:
                - name: shared-data
                  emptyDir: {}
                - name: podinfo
                  downwardAPI:
                    items:
                    - path: "labels"
                      fieldRef:
                        fieldPath: metadata.labels
              terminationGracePeriodSeconds: 10
        - groupName: "2"
          template:
            spec:
              dnsPolicy: ClusterFirstWithHostNet
              initContainers:
              - name: preprocess
                image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
                imagePullPolicy: IfNotPresent
                command: ["/bin/sh", "-c", "cp -r /preprocess/* /shared-data/"]
                securityContext:
                  capabilities:
                    add: [ "IPC_LOCK" ]
                resources:
                  limits:
                    cpu: 1000m
                    memory: 128Mi
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
              # See groupName "1" comment above for why we inject our own
              # wait-gcs-ready and why the name must stay exactly this.
              - name: wait-gcs-ready
                image: {{ .Values.global.image_registry }}/primussafe/{{ .Values.preprocess.image }}
                imagePullPolicy: IfNotPresent
                command: ["/usr/bin/bash", "-c"]
                args:
                  - |
                    set -u
                    HOST="${FQ_RAY_IP}"
                    PORT=6379
                    echo "waiting for GCS at ${HOST}:${PORT}"
                    SECONDS=0
                    while true; do
                      if timeout 2 bash -c "exec 3<>/dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                        echo "GCS is ready (TCP reachable after ${SECONDS}s)."
                        break
                      fi
                      echo "${SECONDS}s elapsed: waiting for GCS to be ready..."
                      SECONDS=$((SECONDS+5))
                      sleep 5
                    done
                resources:
                  requests:
                    cpu: 100m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 128Mi
              containers:
              - name: main
                env:
                - name: NCCL_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: GLOO_SOCKET_IFNAME
                  value: "{{ .Values.net.nccl_socket_ifname }}"
                - name: NCCL_IB_HCA
                  value: "{{ .Values.net.nccl_ib_hca }}"
                - name: NCCL_IB_TIMEOUT
                  value: "23"
                - name: NCCL_IB_RETRY_CNT
                  value: "11"
                - name: NCCL_IB_QPS_PER_CONNECTION
                  value: "1"
                - name: NCCL_CROSS_NIC
                  value: "0"
                - name: NCCL_CHECKS_DISABLE
                  value: "1"
                - name: HSA_ENABLE_SDMA
                  value: "1"
                - name: NCCL_IB_SL
                  value: "0"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.name
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.uid
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: status.podIP
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                ports:
                  - containerPort: 18081
                    name: metrics
                    protocol: TCP
                imagePullPolicy: IfNotPresent
                volumeMounts:
                  - name: shared-data
                    mountPath: /shared-data
                  - name: podinfo
                    mountPath: /etc/podinfo
                    readOnly: true
              schedulerName: kube-scheduler-plugins
              volumes:
                - name: shared-data
                  emptyDir: {}
                - name: podinfo
                  downwardAPI:
                    items:
                    - path: "labels"
                      fieldRef:
                        fieldPath: metadata.labels
              terminationGracePeriodSeconds: 10
