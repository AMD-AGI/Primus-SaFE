#
# Datasources owned by this chart:
#   - safe-postgresql: management-plane's own Postgres, used by SaFE-authored
#     dashboards.
#   - vmselect-<cluster>: one Prometheus datasource per data cluster declared
#     under .Values.grafana.dataClusters, with uid == cluster name. Dashboards
#     pick the cluster via the URL variable var-cluster=<name>, which the
#     Grafana variable system resolves against *datasource uid*. If these
#     uids don't match the data cluster names, dashboards render
#     "Datasource <name> was not found".
#
# The Lens-compat JSON datasource (uid <cluster>-robust-api, type
# marcusolsson-json-datasource, pointing at the data cluster's robust-analyzer)
# is NOT created here on purpose. resource-manager's GrafanaDatasourceSyncer
# creates one per cluster as soon as the primus-robust addon comes online,
# so the JSON datasource follows whatever robust-api endpoint the operator
# annotated on the Cluster CR (NodePort / LB / Ingress) instead of being
# pinned to a chart value.
{{- if .Values.grafana.enable }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: safe-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  instanceSelector:
    matchLabels:
      system: primus-safe
  datasource:
    uid: safe-postgresql
    name: safe-postgresql
    type: postgres
    jsonData:
      database: {{ .Values.grafana.database | default "primus-safe" }}
      connMaxLifetime: 14400
      maxIdleConns: 2
      maxOpenConns: 0
      postgresVersion: 1400
      sslmode: require
      timescaledb: false
    access: proxy
    secureJsonData:
      password: {{ .Values.grafana.password }}
    url: {{ .Values.grafana.postgresUrl | default "primus-safe-ha.primus-safe.svc.cluster.local:5432" }}
    user: {{ .Values.grafana.user | default "primus-safe" }}
{{- range $cluster := (default (list) .Values.grafana.dataClusters) }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: vmselect-{{ $cluster.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace }}
spec:
  instanceSelector:
    matchLabels:
      system: primus-safe
  datasource:
    uid: {{ $cluster.name | quote }}
    name: {{ $cluster.name | quote }}
    type: prometheus
    access: proxy
    editable: true
    isDefault: {{ default false $cluster.isDefault }}
    url: {{ $cluster.vmSelectUrl | quote }}
    jsonData:
      tlsSkipVerify: true
      timeInterval: "30s"
{{- end }}
{{- end }}
