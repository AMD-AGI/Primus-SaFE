# NOTE: Datasources now use the management plane's own DB for SaFE data.
# Data-plane metrics (VictoriaMetrics, Postgres) are accessed via robust-api
# proxy endpoints on each data cluster, not direct connections to primus-lens.
{{- if .Values.grafana.enable }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: safe-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  instanceSelector:
    matchLabels:
      system: primus-safe
  datasource:
    name: safe-postgresql
    type: postgres
    jsonData:
      database: {{ .Values.grafana.database | default "primus-safe" }}
      connMaxLifetime: 14400
      maxIdleConns: 2
      maxOpenConns: 0
      postgresVersion: 1400
      sslmode: require
      timescaledb: false
    access: proxy
    secureJsonData:
      password: {{ .Values.grafana.password }}
    url: {{ .Values.grafana.postgresUrl | default "primus-safe-ha.primus-safe.svc.cluster.local:5432" }}
    user: {{ .Values.grafana.user | default "primus-safe" }}
{{- end }}
