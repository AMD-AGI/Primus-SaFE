{{- if .Values.grafana.enable }}
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    system: primus-safe
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  config:
    paths:
      data: /var/lib/grafana/
      logs: /var/log/grafana
      plugins: /var/lib/grafana/plugins
      provisioning: /etc/grafana/provisioning
    analytics:
      check_for_updates: "true"
    log:
      mode: console
    grafana_net:
      url: https://grafana.net
    server:
      # Grafana sits behind primus-safe-web's nginx, which reverse-proxies
      # ^~ /lens/grafana/ → grafana-service:3000/lens/grafana/ (see
      # Web/apps/safe/nginx.conf). The sub-path and outward-facing host
      # must match what the browser actually sees, otherwise Grafana emits
      # 301 redirects to the wrong URL on every asset / API request and
      # the nginx side stalls until proxy_read_timeout, surfacing as a
      # 504. domain / root_url here drive those absolute URLs.
      domain: {{ printf "%s.%s" .Values.global.sub_domain .Values.global.domain | quote }}
      root_url: {{ printf "https://%s.%s/lens/grafana/" .Values.global.sub_domain .Values.global.domain | quote }}
      serve_from_sub_path: "true"
    security:
      allow_embedding: "true"
    auth.anonymous:
      enabled: "true"
    plugins:
      allow_loading_unsigned_plugins: "marcusolsson-json-datasource"
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_INSTALL_PLUGINS
                  value: "marcusolsson-json-datasource"
  persistentVolumeClaim:
    spec:
      accessModes:
        - "{{ if eq .Values.global.storage_class "juicefs" }}ReadWriteMany{{ else }}ReadWriteOnce{{ end }}"
      resources:
        requests:
          storage: 1Gi
      storageClassName: "{{ .Values.global.storage_class }}"
{{- end }}