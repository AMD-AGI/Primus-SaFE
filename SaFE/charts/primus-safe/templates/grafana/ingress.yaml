{{- if eq .Values.global.ingress "higress" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    higress.io/resource-definer: higress
    higress.io/domain_{{ .Values.global.sub_domain }}.{{ .Values.global.domain }}: "true"
  annotations:
    higress.io/destination: grafana-service.{{ .Release.Namespace }}.svc.cluster.local:3000
    higress.io/ignore-path-case: "false"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: higress
  rules:
    - host: {{ .Values.global.sub_domain }}.{{ .Values.global.domain }}
      http:
        paths:
          - backend:
              resource:
                apiGroup: networking.higress.io
                kind: McpBridge
                name: default
            path: /grafana
            pathType: Prefix
{{- end }}