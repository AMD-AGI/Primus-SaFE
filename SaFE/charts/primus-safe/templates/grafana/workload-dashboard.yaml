#
# Per-workload GPU dashboard (uid "training-workload") embedded by the SaFE
# console's Authoring/Training detail pages:
#   /lens/grafana/d/training-workload/training-workload?var-workload_uid=<uid>
#
# Panels query the robust-compatible workload_gpu_*{workload_uid} series that
# the SaFE metrics-enricher emits, so this works without primus-robust and stays
# forward-compatible: robust's telemetry-gateway emits the same series/names.
#
# The dashboard JSON is loaded verbatim via .Files.Get (from files/dashboards/)
# rather than inlined here. Grafana legend vars like {{gpu_id}}/{{node}}/{{pod}}
# would otherwise be evaluated by Helm's text/template engine ('function
# "gpu_id" not defined'), which is a PARSE error that breaks the whole chart
# regardless of the guard below. .Files.Get content is never templated, so the
# vars pass through untouched. See issue #660.
#
# Only created when the direct-metrics path is enabled AND Grafana is on.
{{- if and .Values.grafana.enable (default (default .Values.observability).metrics).enable }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: training-workload
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  folder: "General"
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      system: primus-safe
  json: |
{{ .Files.Get "files/dashboards/training-workload.json" | indent 4 }}
{{- end }}
