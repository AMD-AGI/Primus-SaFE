#
# Per-workload GPU dashboard (uid "training-workload") embedded by the SaFE
# console's Authoring/Training detail pages:
#   /lens/grafana/d/training-workload/training-workload?var-workload_uid=<uid>
#
# Panels query the robust-compatible workload_gpu_*{workload_uid} series that
# the SaFE metrics-enricher emits, so this works without primus-robust and stays
# forward-compatible: robust's telemetry-gateway emits the same series/names.
#
# Only created when the direct-metrics path is enabled AND Grafana is on.
{{- if and .Values.grafana.enable (default (default .Values.observability).metrics).enable }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: training-workload
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  folder: "General"
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      system: primus-safe
  json: |
    {
      "uid": "training-workload",
      "title": "Training Workload",
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-12h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "workload_uid",
            "type": "textbox",
            "label": "Workload UID",
            "query": "",
            "current": { "text": "", "value": "" },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "GPU Utilization (%)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_utilization{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "GPU Socket Power (W)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "watt", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_socket_power_watts{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "GPU Memory Utilization (%)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_memory_utilization{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "GPU Memory Used",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_memory_used_bytes{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "GPU Junction Temperature (\u00b0C)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "celsius", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_temperature_junction_celsius{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "GPU Memory Temperature (\u00b0C)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "celsius", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_temperature_memory_celsius{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Pod CPU Usage (cores)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "fieldConfig": { "defaults": { "unit": "short", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]) * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Pod Memory Usage",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "fieldConfig": { "defaults": { "unit": "bytes", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (pod) (container_memory_working_set_bytes{container!=\"\"} * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Pod Read Bytes/s",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "fieldConfig": { "defaults": { "unit": "Bps", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (pod) (rate(container_fs_reads_bytes_total{container!=\"\"}[5m]) * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Pod Write Bytes/s",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "fieldConfig": { "defaults": { "unit": "Bps", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (pod) (rate(container_fs_writes_bytes_total{container!=\"\"}[5m]) * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "GPU PCIe Bandwidth (MB/s)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "fieldConfig": { "defaults": { "unit": "MBs", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "workload_gpu_pcie_bandwidth_mbs{workload_uid=\"$workload_uid\"}",
              "legendFormat": "GPU {{gpu_id}} ({{node}})"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Pod Memory Utilization (%)",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "100 * sum by (pod) (container_memory_working_set_bytes{container!=\"\"} * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"}) / sum by (pod) (container_spec_memory_limit_bytes{container!=\"\"} * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Pod Ephemeral Storage",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "fieldConfig": { "defaults": { "unit": "bytes", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (pod) (container_fs_usage_bytes{container!=\"\"} * on(namespace,pod) group_left() workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "RDMA TX Bandwidth",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "fieldConfig": { "defaults": { "unit": "Bps", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (node) (rate(rdma_comm_tx_bytes_total[5m])) * on(node) group_left(workload_uid) max by (node,workload_uid) (workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "RDMA TX Ops/s",
          "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 56 },
          "fieldConfig": { "defaults": { "unit": "ops", "min": 0 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "primus-safe-vm" },
              "expr": "sum by (node) (rate(rdma_comm_tx_ops_total[5m])) * on(node) group_left(workload_uid) max by (node,workload_uid) (workload_pod_info{workload_uid=\"$workload_uid\"})",
              "legendFormat": "{{node}}"
            }
          ]
        }
      ]
    }
{{- end }}
