# core42-cluster overrides for primus-safe.
#
# Layered on top of values.yaml — apply with:
#   helm upgrade primus-safe ./SaFE/charts/primus-safe \
#     -f SaFE/charts/primus-safe/values.yaml \
#     -f SaFE/charts/primus-safe/values-core42.yaml
#
# This file pins everything that is specific to the core42 environment
# (data-plane endpoints, datasource URLs) so the rendered ConfigMap
# survives `helm upgrade` and stays in sync with what we run in production.

# Route legacy /lens/v1/* (still used by the SaFE web home page for
# gpu-aggregation calls) to core42's robust-analyzer NodePort. Without this
# every /lens/v1/... call returns Primus.00005 "not found" because the
# primus-lens-api service no longer exists.
lens_compat_proxy:
  enable: true
  prefix: "/lens/v1"
  # NodePort on a core42 control-plane node (10.245.129.5 = c04u013).
  # If you swap to an Ingress / different node, update both this and
  # grafana.lensApiUrl below in lockstep.
  target: "http://10.245.129.5:32626/api/v1"

# Grafana embedded in SaFE web (/lens/grafana/).
grafana:
  enable: true
  password: "admin"
  # One datasource per data cluster. The uid MUST equal the Cluster CR
  # name; dashboards reference cluster datasources via var-cluster=<name>
  # which Grafana resolves against datasource uid (not name).
  dataClusters:
    - name: core42
      vmSelectUrl: "http://10.245.129.5:32481/select/0/prometheus"
      isDefault: true
  # Lens-compat JSON datasource — same target as lens_compat_proxy above
  # but kept separate because Grafana queries it directly (proxy is for the
  # browser hitting SaFE web).
  lensApiUrl: "http://10.245.129.5:32626/api"
