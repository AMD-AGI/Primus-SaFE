# Example overrides for primus-safe.
#
# This file is illustrative only — copy it to your own (private) operations
# repo and fill in site-specific values there. Never commit site-specific
# endpoints, IP addresses or credentials back into this chart.
#
# Usage:
#   helm upgrade primus-safe ./SaFE/charts/primus-safe \
#     -f SaFE/charts/primus-safe/values.yaml \
#     -f <your-private-ops-repo>/values-<env>.yaml

global:
  image_registry: "<your-registry>/primussafe"
  image_pull_secret: "primus-safe-image"
  storage_class: "<your-storage-class>"
  domain: "primus-safe.amd.com"
  sub_domain: "<env>"

grafana:
  enable: true
  # Local admin password; can be replaced with a Secret mount.
  password: "<grafana-admin-password>"
  # Postgres datasource backing the SaFE management DB (usually left as
  # default). dataClusters and lensApiUrl have been removed in favour of
  # dynamic discovery via the robust-api addon annotation on each Cluster CR.
  postgresUrl: "primus-safe-ha.primus-safe.svc.cluster.local:5432"
  database: "primus-safe"
  user: "primus-safe"

opensearch:
  enable: true
  # Points at the OpenSearch Service provisioned by the primus-robust addon.
  endpoint: "primus-robust-logs.primus-robust.svc.cluster.local:9200"
  # The admin credentials are usually copied in by the cross-namespace
  # secret-copier job (see templates/secrets/copy_primus_lens_secret_job.yaml).
  secret: "primus-safe-opensearch-config"
  secret_namespace: "primus-safe"
