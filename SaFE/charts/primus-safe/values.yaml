#
# Default chart values. Site-specific overrides (image registries, storage
# classes, secret names, per-cluster endpoints, etc.) belong in a private
# operations repo and should be applied via `helm upgrade ... -f ...`, not
# committed to this chart.
global:
  # Domain and sub_domain are mainly used for console access
  domain: "primus-safe.amd.com"
  sub_domain: ""
  # Image registry address where management components are uploaded
  image_registry: "docker.io"
  # Secret used for image downloading, created via install.sh
  image_pull_secret: "primus-safe-image"
  # Kubernetes storage class for persistent storage
  storage_class: "local-path"
  # csi volume handle name for wekafs
  csi_volume_handle: ""
net:
  # Network interface for NCCL socket communication
  nccl_socket_ifname: "eno0"
  # RDMA network interfaces for high-performance communication
  nccl_ib_hca: "rdma0,rdma1,rdma2,rdma3,rdma4,rdma5,rdma6,rdma7"
  # RDMA resource name
  rdma_name: "rdma/hca"
  # Ingress component name selected during install.sh
  ingress: "higress"
# CD (Continuous Deployment) configuration
cd:
  # Whether deployment requests require approval from another user
  # true: users cannot approve their own requests (production environment)
  # false: users can self-approve their own requests (development environment)
  require_approval: true
  # This list is of deployable components
  components: "apiserver,resource_manager,job_manager,webhooks,web,preprocess,node_agent,cicd_runner,cicd_unified_job,model_downloader,ops_download,a2a_gateway,monarch"
apiserver:
  # Apiserver component image version
  image: "apiserver:latest"
  # Number of replicas for apiserver deployment
  replicas: 1
  # CPU resources allocated to apiserver
  cpu: 2000m
  # Memory resources allocated to apiserver
  memory: 4Gi
  # The nodeport for apiserver service
  node_port: 32495
# OpenTelemetry tracing configuration
tracing:
  # Enable distributed tracing (configured via .env)
  enable: true
resource_manager:
  # Resource manager component image version
  image: "resource-manager:latest"
  # Number of replicas for resource manager deployment
  replicas: 1
  # CPU resources allocated to resource manager
  cpu: 2000m
  # Memory resources allocated to resource manager
  memory: 4Gi
job_manager:
  # Job manager component image version
  image: "job-manager:latest"
  # Number of replicas for job manager deployment
  replicas: 1
  # CPU resources allocated to job manager
  cpu: 2000m
  # Memory resources allocated to job manager
  memory: 4Gi
  # Port for Prometheus metrics endpoint
  metrics_port: 8000
webhooks:
  # Webhooks component image version
  image: "webhooks:latest"
  # Number of replicas for webhooks deployment
  replicas: 1
  # CPU resources allocated to webhooks
  cpu: 2000m
  # Memory resources allocated to webhooks
  memory: 4Gi
web:
  # Web console component image version
  image: "primus-safe-web:latest"
  # Number of replicas for web console deployment
  replicas: 1
  # CPU resources allocated to web console
  cpu: 2000m
  # Memory resources allocated to web console
  memory: 4Gi
preprocess:
  # Preprocessing component image version. used for pytorch-job etc.
  image: "preprocess:latest"
monarch:
  enable: true
  image: "monarch:latest"
  client_role: "monarch-client"
ops_job:
  # Opsjob download image version. used for download file
  download_image: "s3-downloader:latest"
  # Opsjob evalscope image version. used for model evaluation
  evalscope_image: "evalscope:latest"
cicd:
  enable: true
  role_name: "gha-rs-manager"
  controller_name: "gha-runner-scale-set-gha-rs-controller"
  # cicd component image version. used for starting jobs for runner
  runner: "cicd-runner-proxy:latest"
  unified_job: "cicd-unified-job-proxy:latest"
db:
  # Enable database for historical job queries, defaults to true
  enable: true
opensearch:
  # Log search feature flag. When true, log search endpoints are available.
  # Queries are proxied through robust-api on data clusters (no direct OpenSearch connection).
  enable: true
  # Index prefix used to build the date-scoped OpenSearch URIs for pod/node
  # logs, e.g. "<prefix>2026.04.21". Must match the prefix fluentbit is
  # actually writing to. The current primus-robust FluentBit config writes
  # pod/node logs to `node-<date>` indices; the legacy "fluentbit-" prefix
  # applied to the old primus-lens deployment and produced
  # "no such index [fluentbit-2026.04.21]" 404s after the migration.
  prefix: "node-"
  secret: "primus-safe-opensearch-config"
  secret_namespace: "primus-safe"
  secret_path: "/etc/secrets/opensearch"
  # Default points at the OpenSearch Service this project's robust stack
  # provisions in each data cluster. SaFE apiserver doesn't dial this
  # directly (queries always go through robust-analyzer), but the value is
  # baked into the UI/envs response so keep it aligned with reality.
  # Previous default pointed at the removed primus-lens service.
  endpoint: "primus-robust-logs.primus-robust.svc.cluster.local:9200"
ssh:
  # Enable SSH access to user containers
  enable: true
  # SSH server IP for jump server access
  server_ip: ""
user:
  # Require token for user access, can be disabled in internal networks
  token_required: false
sso:
  # Enable sso login
  enable: true
  # The secret for sso, which contains the id, secret, endpoint and redirect_uri
  secret: "primus-safe-sso"
  # Path to mount sso secret
  secret_path: "/etc/secrets/sso"
workspace:
  # Reserved system resources for management components
  mem_reserve_percent: 0.05
  cpu_reserve_percent: 0.1
  ephemeral_store_reserve_percent: 0.05
s3:
  # Enable S3 service access, mainly used for log downloading
  enable: false
  # Secret containing S3 access key and secret key, bucket and endpoint
  secret: "primus-safe-s3"
  # Path to mount S3 secret
  secret_path: "/etc/secrets/s3"
notification:
  # Email notification configuration (optional)
  # If configured, notifications will be enabled automatically
  email:
    # SMTP server host
    smtp_host: ""
    # SMTP server port (587 for STARTTLS, 465 for SSL)
    smtp_port: 587
    # SMTP authentication username
    username: ""
    # SMTP authentication password
    password: ""
    # Email address used as sender
    from: ""
    # Use TLS/SSL (true for port 465, false for port 587 STARTTLS)
    use_tls: false
  # Email relay mode (for clusters that cannot reach SMTP directly)
  # When enabled, emails are queued in DB and streamed via SSE to a central relay service.
  # Takes precedence over direct email when both are configured.
  email_relay:
    # Enable email relay mode
    enable: true
grafana:
  # Enable Grafana for monitoring metrics display
  enable: false
  # Grafana password
  password: ""
  # One entry per data cluster whose VictoriaMetrics should appear as a
  # Grafana datasource. `name` becomes both the datasource uid and display
  # name — dashboards resolve var-cluster=<name> against the uid, so the
  # value MUST match the Cluster CR name that SaFE uses.
  # `vmSelectUrl` should point to that cluster's vmselect (typically a
  # NodePort on a control-plane node or an Ingress). Set isDefault: true on
  # the cluster you want to see first in any Prometheus picker.
  # Example:
  #   dataClusters:
  #     - name: core42
  #       vmSelectUrl: http://10.245.129.5:32481/select/0/prometheus
  #       isDefault: true
  dataClusters: []
  # URL of a robust-analyzer reachable from the management plane, used as
  # the Lens-compat JSON datasource. Expected to answer /v1/workloads/...
  # (the SaFE apiserver /lens/v1 proxy strips /lens and forwards the rest
  # so the path lines up with robust-api). Leave empty to skip creating the
  # datasource.
  # Example: http://10.245.129.5:32626/api
  lensApiUrl: ""
addon:
  # Default components installed with the system
  default: cert-manager.v1.17.2,training-operator.1.9.2,network-operator.25.4.0,kube-scheduler-plugins-0.31.8,amd-gpu-operator-charts-v1.4.0,csi-wekafsplugin.2.7.7
proxy:
  # Proxy services configuration for reverse proxying to backend services
  # Each service will be accessible via apiserver with authentication
  services: []
  # Example configuration:
  # services:
  #   - name: qa-agent
  #     prefix: /agent/qa
  #     target: http://qa-agent-service:8080
  #     enabled: true

# NOTE: the legacy /lens/v1/* URL prefix (gpu-aggregation, training, logs,
# workloads) is now served by apiserver's built-in lens-compat handler.
# The handler picks the target robust-analyzer dynamically from the Cluster
# CR annotation (primus-safe.amd.com/robust-api-endpoint) of whichever
# cluster the request's ?cluster=<name> query parameter names, so there is
# no longer any lens_compat_proxy value to configure here.
langfuse_proxy:
  # Langfuse proxy: unified Trace ingestion via SaFE API Key (ak-xxx)
  enable: false
  # Internal Langfuse service address
  target: "http://langfuse-web.langfuse.svc.cluster.local:3000/langfuse"
  # Secret name for shared Langfuse project credentials
  secret: "primus-safe-langfuse-proxy"
  secret_path: "/etc/secrets/langfuse-proxy"
  # Shared Langfuse project credentials (stored in Secret, not ConfigMap)
  public_key: ""
  secret_key: ""
a2a:
  # A2A service discovery scanner
  scanner_enable: true
  scanner_interval: 60
  scanner_namespaces: []
a2a_gateway:
  # A2A Gateway for Agent-to-Agent invocations
  enable: true
  image: "a2a-gateway:latest"
  replicas: 1
  cpu: 500m
  memory: 512Mi
  port: 8089
  metrics_port: 9090
llm_gateway:
  enabled: true
  secret_path: "/etc/secrets/llm-gateway"
