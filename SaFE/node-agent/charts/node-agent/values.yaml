node_agent:
  image: "node-agent:latest"
  image_registry: "docker.io"
  image_pull_secret: "primus-safe-image"
  rdma_name: "rdma/hca"
  sub_domain: ""
monitor:
  nccl_socket_ifname: "eno0"
  nccl_ib_hca: "rdma0,rdma1,rdma2,rdma3,rdma4,rdma5,rdma6,rdma7"
  gpu_driver: "6.12.12"
  rocm_version: "6.4"
  nfs_server: ""
  nfs_server_path: ""
  nfs_mount: ""
  nfs_type: ""
  all_nfs_path: ""
  resolv_search_domain: ""
  # Toggle switches for monitor scripts. Key matches config entry name (e.g., gpu_module_001).
  # Value: "on" or "off". Omitted keys use default (see config.yaml).
  toggles:
    net_bnxt_load_204: "off"
    net_ainic_load_205: "off"
    net_ainic_devices_208: "off"
    # 309 verifies the three csi-wekafs-node containers are Running on nodes
    # that mount WekaFS. It used to be "off" because the script mis-parsed
    # crictl output (matched pod name, not container name). The monitor
    # itself has been corrected, so enable by default and let operators
    # explicitly turn it off on clusters without WekaFS.
    sys_csi_wekafs_309: "on"
    disk_nfs_exist_check_402: "off"
