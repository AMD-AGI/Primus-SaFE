apiVersion: apps/v1
kind: Deployment
metadata:
  name: primus-lens-web
  namespace: primus-lens
  labels:
    app: primus-lens-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: primus-lens-web
  template:
    metadata:
      labels:
        app: primus-lens-web
    spec:
      containers:
        - name: app
          image: primussafe/primus-lens-web:1.0.17
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: primus-lens-web
  namespace: primus-lens
  labels:
    app: primus-lens-web
spec:
  selector:
    app: primus-lens-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
