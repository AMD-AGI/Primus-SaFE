# nginx.conf
daemon off;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Increase header buffer size to prevent 400/500 from large third-party cookies
    large_client_header_buffers 4 32k;

    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/json;
    gzip_min_length 1024;

    # Map for WebSocket/SSE connection upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        root  /app/dist/;
        index index.html;


        # Lens Agent Chat API proxy
        location /lens/v1/agent/ {
            proxy_pass http://lens-agent-chat-service.primus-lens.svc.cluster.local:8000/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming configuration
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Disable nginx buffering for SSE
            proxy_set_header X-Accel-Buffering no;

            # Increase timeout for long-running connections
            proxy_read_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        # Lens API proxy (general path) — under /lens
        location /lens/v1/ {
            proxy_pass http://primus-lens-api.primus-lens.svc.cluster.local:8989/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 for WebSocket and SSE
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SSE/Streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            chunked_transfer_encoding on;

            # Long-running connection timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        # SaFE API proxy — Lens frontend auth.ts calls /api/v1/login etc.
        # Forward to SaFE backend (aligned with vite.config.js dev proxy)
        location /api/v1/ {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward only backend-required cookies, strip large third-party tracking cookies
            # (.amd.com domain Akamai/GA/Facebook cookies can reach 4-5KB causing backend 500)
            proxy_set_header Cookie "Token=$cookie_Token; userId=$cookie_userId; userType=$cookie_userType";

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Main app path — under /lens (static files and SPA routes)
        location /lens {
            alias /app/dist;
            try_files $uri $uri/ /lens/index.html;

            # Static asset caching
            location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
                expires 7d;
                access_log off;
            }
        }

        # Redirect root to /lens (optional)
        location = / {
            return 301 /lens/;
        }
    }
}

