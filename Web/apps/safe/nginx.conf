# nginx.conf
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Use cluster DNS for upstream resolution and refresh every 30 seconds.
    # Without this, nginx caches the ClusterIP of every proxy_pass target at
    # worker startup and never retries the DNS lookup, so whenever an
    # upstream Service is deleted and recreated (which happens at least on
    # chart re-install) the cached IP no longer belongs to any pod and every
    # request to that location hangs until the TCP connect timeout, surfacing
    # as a user-visible 504. Variable-based proxy_pass targets below are what
    # forces nginx to honour this resolver on every request.
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    log_format analytics '$remote_addr [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_user_agent" '
                     '$cookie_userId';

    # Analytics log
    access_log /var/log/nginx/analytics.log analytics;

    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Support large file uploads (global setting)
    client_max_body_size 100G;

    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/json;
    gzip_min_length 1024;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        location = /api/v1/agent/qa/api/v1/ask {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE: must disable buffering to avoid batching that blocks frontend streaming
            proxy_buffering off;
            proxy_cache off;
            gzip off;

            # Prevent intermediate caching/merging
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";

            # Keep long connections stable
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        location ~* ^/api/v1/agent/qa/(sse|stream|events)(/|$) {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;

            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";

            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        location ~* ^/api/v1/agent/ops/(sse|stream|events)(/|$) {

            # Direct proxy_pass, do not modify path
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            gzip off;

            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";

            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 75s;
        }


        # Dataset upload endpoint — supports large files and long uploads
        location /api/v1/datasets {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Large file upload support
            client_max_body_size 100G;
            client_body_timeout 1800s;

            # Disable buffering to avoid high memory usage
            proxy_buffering off;
            proxy_request_buffering off;

            # Extended timeout — 30 minutes
            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        location /api/v1/ {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase upstream response header buffers + extend timeouts
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # Compatibility with frontend default /api prefix (equivalent to /api/v1)
        location /api/ {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # ========== PrimusClaw API ==========
        # SSE 流式接口 — 必须关闭缓冲
        location ~* ^/claw-api/v1/chat/sessions/.+/messages {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 关键配置
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # PrimusClaw 普通 REST 接口
        location ^~ /claw-api/ {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Grafana Lens-style embed. This must come *before* the catch-all
        # ^~ /lens/ block below because nginx picks the longest matching
        # prefix ("^~" disables regex fallthrough). Without this block every
        # Grafana dashboard URL is forwarded to apiserver, which doesn't
        # speak Grafana's /api/live/ websocket nor its HTML shell and
        # returns 404 (Primus.00005 "not found").
        #
        # Upstream is declared as a variable ($grafana_upstream) so that
        # proxy_pass is re-resolved through the `resolver` directive above
        # on every request instead of being frozen to the ClusterIP present
        # at worker startup. Re-creating grafana-service (e.g. from a
        # chart upgrade) would otherwise leave nginx pointing at a dead IP
        # and the user sees a 504 until the web pod is restarted.
        location ^~ /lens/grafana/ {
            set $grafana_upstream grafana-service.primus-safe.svc.cluster.local;
            proxy_pass http://$grafana_upstream:3000/lens/grafana/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
        location ^~ /lens/grafana/api/live/ {
            set $grafana_upstream grafana-service.primus-safe.svc.cluster.local;
            proxy_pass http://$grafana_upstream:3000/lens/grafana/api/live/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        location ^~ /lens/ {
            proxy_pass http://primus-safe-apiserver.primus-safe:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }



        location = /__internal_analytics/ws {
            proxy_pass http://127.0.0.1:7890;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600;
        }

        # Internal analytics report page
        location /__internal_analytics/ {
            alias /usr/share/nginx/html/__internal_analytics/;
            autoindex off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
            expires 7d;
            access_log off;
        }

        error_page 404 /index.html;

    }


}
