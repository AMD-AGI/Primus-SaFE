# Unified nginx config for the merged SaFE + Lens frontend image.
#
# Backend consolidation status (confirmed with backend, 2026-04):
#   * Lens API has moved into primus-safe-apiserver. The standalone
#     primus-lens-api and lens-agent-chat-service services are gone; the
#     new upstream accepts the full /lens/v1/... path as-is (no rewrite).
#   * Grafana has moved into the primus-safe namespace as grafana-service.
#
# Path layout served from this container:
#   /                       -> SaFE SPA (/usr/share/nginx/html)
#   /lens/                  -> Lens SPA (/usr/share/nginx/html/lens, vite base=/lens/)
#   /api/v1/                -> primus-safe-apiserver.primus-safe:8088
#   /claw-api/              -> primus-safe-apiserver.primus-safe:8088
#   /lens/v1/               -> primus-safe-apiserver.primus-safe:8088 (Lens API, no rewrite)
#   /lens/grafana/          -> grafana-service.primus-safe.svc:3000
#   /lens/grafana/api/live/ -> grafana-service.primus-safe.svc:3000 (Grafana Live WebSocket)
#   /__internal_analytics/  -> goaccess dashboard (sidecar in this container)
#
# IMPORTANT: nginx prefix locations match longest-prefix-first, so the
# `/lens/v1*` and `/lens/grafana*` proxy rules below take precedence over
# the static `/lens/` location. We also use `^~` on the proxy blocks so
# they stay ahead of any future regex rules.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format analytics '$remote_addr [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_user_agent" '
                         '$cookie_userId';

    access_log /var/log/nginx/analytics.log analytics;

    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Large dataset / artifact uploads
    client_max_body_size 100G;

    # Tolerate large third-party cookies (e.g. .amd.com Akamai/GA cookies)
    large_client_header_buffers 4 32k;

    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/json;
    gzip_min_length 1024;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # One upstream per real backend service. Keep these names in sync with
    # the Service resources deployed on the cluster.
    upstream safe_backend {
        server primus-safe-apiserver.primus-safe:8088;
        keepalive 32;
    }

    upstream grafana {
        server grafana-service.primus-safe.svc:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ============================================================
        # SaFE backend APIs
        # ============================================================

        # SaFE QA — single-shot ask endpoint (SSE)
        location = /api/v1/agent/qa/api/v1/ask {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SaFE QA — streaming endpoints
        location ~* ^/api/v1/agent/qa/(sse|stream|events)(/|$) {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SaFE Ops agent — WebSocket / SSE
        location ~* ^/api/v1/agent/ops/(sse|stream|events)(/|$) {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Dataset upload — large files, long timeouts, no buffering
        location /api/v1/datasets {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 100G;
            client_body_timeout 1800s;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # General SaFE API
        location /api/v1/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Compatibility prefix: /api/ -> /api/v1/
        location /api/ {
            proxy_pass http://safe_backend/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ============================================================
        # PrimusClaw backend APIs
        # ============================================================

        # Claw chat sessions — SSE streaming
        location ~* ^/claw-api/v1/chat/sessions/.+/messages {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Claw — general REST
        location ^~ /claw-api/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ============================================================
        # Lens backend APIs
        # Must be declared BEFORE the static /lens/ location so the
        # longest-prefix match rule keeps API requests on the proxy.
        # ============================================================

        # Grafana Live WebSocket — must be declared BEFORE /lens/grafana/
        # so nginx's longest-prefix match routes /api/live/ through this block.
        location ^~ /lens/grafana/api/live/ {
            proxy_pass http://grafana/lens/grafana/api/live/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 75s;
        }

        # Grafana page proxy (preserves the /lens/grafana prefix upstream).
        location ^~ /lens/grafana/ {
            proxy_pass http://grafana/lens/grafana/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 30s;
        }

        # Lens agent chat — SSE streaming. Backend consumes the full
        # /lens/v1/agent/... path, so no rewrite is performed.
        location ^~ /lens/v1/agent/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Lens — general REST + WebSocket. Backend consumes the full
        # /lens/v1/... path, so no rewrite is performed.
        location ^~ /lens/v1/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ============================================================
        # Internal analytics (goaccess)
        # ============================================================

        location = /__internal_analytics/ws {
            proxy_pass http://127.0.0.1:7890;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600;
        }

        location /__internal_analytics/ {
            alias /usr/share/nginx/html/__internal_analytics/;
            autoindex off;
        }

        # ============================================================
        # Static SPAs
        # ============================================================

        # Lens SPA — vite base is /lens/, so all assets are emitted as
        # /lens/assets/*. SPA routes fall back to /lens/index.html.
        location /lens/ {
            try_files $uri $uri/ /lens/index.html;
        }

        # SaFE SPA (root)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-lived caching for hashed static assets (covers both apps)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
            expires 7d;
            access_log off;
        }

        error_page 404 /index.html;
    }
}
