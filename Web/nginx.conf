# Unified nginx config for the merged SaFE + Lens frontend image.
#
# Only the frontend is merged. Each upstream service keeps its own identity
# on the cluster; nginx just dispatches requests to the right one based on
# path prefix.
#
# Path layout served from this container:
#   /                  -> SaFE SPA  (root of /usr/share/nginx/html)
#   /lens/             -> Lens SPA  (/usr/share/nginx/html/lens, vite base=/lens/)
#   /api/v1/           -> SaFE backend       (primus-safe-apiserver.primus-safe:8088)
#   /claw-api/         -> PrimusClaw backend (primus-safe-apiserver.primus-safe:8088)
#   /lens/v1/agent/    -> Lens agent chat    (lens-agent-chat-service.primus-lens:8000)
#   /lens/v1/          -> Lens API           (primus-lens-api.primus-lens:8989)
#   /__internal_analytics/  -> goaccess dashboard (sidecar inside this container)
#
# IMPORTANT: nginx prefix locations match longest-prefix-first, so the
# `/lens/v1*` proxy rules below take precedence over `/lens/` (which serves
# static files). We still use `^~` on the proxy blocks defensively so they
# stay ahead of any future regex rules.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format analytics '$remote_addr [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_user_agent" '
                         '$cookie_userId';

    access_log /var/log/nginx/analytics.log analytics;

    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Large dataset / artifact uploads
    client_max_body_size 100G;

    # Tolerate large third-party cookies (e.g. .amd.com Akamai/GA cookies)
    large_client_header_buffers 4 32k;

    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/json;
    gzip_min_length 1024;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # One upstream per real backend service. Keep these names in sync with
    # the Service resources deployed on the cluster.
    upstream safe_backend {
        server primus-safe-apiserver.primus-safe:8088;
        keepalive 32;
    }

    upstream lens_api {
        server primus-lens-api.primus-lens.svc.cluster.local:8989;
        keepalive 32;
    }

    upstream lens_agent_chat {
        server lens-agent-chat-service.primus-lens.svc.cluster.local:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ============================================================
        # SaFE backend APIs
        # ============================================================

        # SaFE QA — single-shot ask endpoint (SSE)
        location = /api/v1/agent/qa/api/v1/ask {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SaFE QA — streaming endpoints
        location ~* ^/api/v1/agent/qa/(sse|stream|events)(/|$) {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SaFE Ops agent — WebSocket / SSE
        location ~* ^/api/v1/agent/ops/(sse|stream|events)(/|$) {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Dataset upload — large files, long timeouts, no buffering
        location /api/v1/datasets {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 100G;
            client_body_timeout 1800s;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # General SaFE API
        location /api/v1/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Compatibility prefix: /api/ -> /api/v1/
        location /api/ {
            proxy_pass http://safe_backend/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_connect_timeout 30s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ============================================================
        # PrimusClaw backend APIs
        # ============================================================

        # Claw chat sessions — SSE streaming
        location ~* ^/claw-api/v1/chat/sessions/.+/messages {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Claw — general REST
        location ^~ /claw-api/ {
            proxy_pass http://safe_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ============================================================
        # Lens backend APIs
        # Must be declared BEFORE the static /lens/ location so the
        # longest-prefix match rule keeps API requests on the proxy.
        # ============================================================

        # Lens agent chat — SSE streaming.
        # proxy_pass ends with /api/v1/ so nginx strips the `/lens/v1/agent/`
        # prefix and forwards /lens/v1/agent/foo as /api/v1/foo upstream.
        location ^~ /lens/v1/agent/ {
            proxy_pass http://lens_agent_chat/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            gzip off;
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Lens — general REST + WebSocket.
        # proxy_pass ends with /v1/ so nginx strips `/lens/v1/` and forwards
        # /lens/v1/foo as /v1/foo upstream (matches the old lens nginx).
        location ^~ /lens/v1/ {
            proxy_pass http://lens_api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering "no";
            chunked_transfer_encoding on;

            proxy_connect_timeout 75s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ============================================================
        # Internal analytics (goaccess)
        # ============================================================

        location = /__internal_analytics/ws {
            proxy_pass http://127.0.0.1:7890;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 3600;
        }

        location /__internal_analytics/ {
            alias /usr/share/nginx/html/__internal_analytics/;
            autoindex off;
        }

        # ============================================================
        # Static SPAs
        # ============================================================

        # Lens SPA — vite base is /lens/, so all assets are emitted as
        # /lens/assets/*. SPA routes fall back to /lens/index.html.
        location /lens/ {
            try_files $uri $uri/ /lens/index.html;
        }

        # SaFE SPA (root)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-lived caching for hashed static assets (covers both apps)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
            expires 7d;
            access_log off;
        }

        error_page 404 /index.html;
    }
}
